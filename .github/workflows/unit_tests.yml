name: Unit & Widget Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  unit-tests:
    name: Flutter Unit & Widget Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Restore google-services.json from secret
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > android/app/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Generate mocks (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: Run unit tests
        id: unit
        run: |
          flutter test test/unit/ --reporter compact 2>&1 | tee unit-output.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run widget tests
        id: widget
        run: |
          flutter test test/widget/ --reporter compact 2>&1 | tee widget-output.log
          echo "exit_code=${PIPESTATUS[0]}" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Run smoke widget test
        run: flutter test test/widget_test.dart --reporter compact 2>&1 | tee smoke-output.log
        continue-on-error: true

      - name: Run all tests with coverage
        id: coverage
        run: |
          flutter test --coverage \
            --reporter json \
            --file-reporter json:flutter-results.json \
            2>&1 | tee coverage-output.log || true

          # Extract pass/fail from JSON reporter
          TOTAL=$(python3 -c "
          import json, pathlib
          lines=[l for l in pathlib.Path('flutter-results.json').read_text().splitlines() if l.strip()]
          events=[json.loads(l) for l in lines if l.startswith('{')]
          done=[e for e in events if e.get('type')=='testDone']
          print(len(done))
          " 2>/dev/null || echo 0)
          FAILED=$(python3 -c "
          import json, pathlib
          lines=[l for l in pathlib.Path('flutter-results.json').read_text().splitlines() if l.strip()]
          events=[json.loads(l) for l in lines if l.startswith('{')]
          done=[e for e in events if e.get('type')=='testDone' and e.get('result')=='error']
          print(len(done))
          " 2>/dev/null || echo 0)

          echo "total=$TOTAL"   >> $GITHUB_OUTPUT
          echo "failed=$FAILED" >> $GITHUB_OUTPUT

          # Coverage percentage
          COV_PCT="?"
          if [ -f coverage/lcov.info ]; then
            COV_PCT=$(awk '
              /^DA:/{split($0,a,","); total++; if(a[2]>0) hit++}
              END{if(total>0) printf "%.1f%%", hit/total*100}
            ' coverage/lcov.info)
          fi
          echo "coverage=$COV_PCT" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Write GitHub Job Summary
        if: always()
        run: |
          TOTAL="${{ steps.coverage.outputs.total }}"
          FAILED="${{ steps.coverage.outputs.failed }}"
          COV="${{ steps.coverage.outputs.coverage }}"
          PASSED=$((TOTAL - FAILED))
          ICON="✅"
          [ "$FAILED" -gt 0 ] 2>/dev/null && ICON="❌"

          cat >> $GITHUB_STEP_SUMMARY <<EOF
          # ${ICON} Flutter Unit & Widget Tests

          | Metric | Value |
          |--------|-------|
          | Total Tests | ${TOTAL} |
          | ✅ Passed | ${PASSED} |
          | ❌ Failed | ${FAILED} |
          | 📊 Coverage | ${COV} |
          EOF

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ github.run_number }}
          path: |
            flutter-results.json
            unit-output.log
            widget-output.log
            smoke-output.log
            coverage-output.log
            coverage/lcov.info

      - name: Post PR comment with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const total   = parseInt('${{ steps.coverage.outputs.total }}'  || '0');
            const failed  = parseInt('${{ steps.coverage.outputs.failed }}' || '0');
            const cov     = '${{ steps.coverage.outputs.coverage }}';
            const passed  = total - failed;
            const icon    = failed === 0 ? '✅' : '❌';
            const result  = failed === 0 ? 'PASS' : 'FAIL';

            const body = [
              `## ${icon} Flutter Unit & Widget Tests — ${result}`,
              '',
              '| Metric | Value |',
              '|--------|-------|',
              `| Total Tests | ${total} |`,
              `| ✅ Passed | ${passed} |`,
              `| ❌ Failed | ${failed} |`,
              `| 📊 Coverage | ${cov} |`,
              '',
              `[View full log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
