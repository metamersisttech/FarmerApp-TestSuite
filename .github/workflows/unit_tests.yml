name: Unit & Widget Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Flutter Unit & Widget Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true

      - name: Restore google-services.json from secret
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > android/app/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Generate mocks (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs
        continue-on-error: true   # mocks may not be needed for all tests

      - name: Run all tests
        run: flutter test --reporter json > test-results.json
        continue-on-error: true

      - name: Pretty print results
        if: always()
        run: |
          flutter test --reporter compact || true

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ github.run_number }}
          path: test-results.json

      - name: Post PR comment on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Unit/Widget tests failed** on this PR.\n\nCheck the [Actions log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            });
