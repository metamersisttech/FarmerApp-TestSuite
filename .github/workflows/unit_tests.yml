name: Unit & Widget Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  unit-tests:
    name: Flutter Unit & Widget Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 'stable'
          cache: true

      - name: Restore google-services.json from secret
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > android/app/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Generate mocks (build_runner)
        run: dart run build_runner build --delete-conflicting-outputs
        continue-on-error: true   # mocks may not exist for all tests

      - name: Run unit tests
        run: flutter test test/unit/ --reporter compact
        continue-on-error: true

      - name: Run widget tests
        run: flutter test test/widget/ --reporter compact
        continue-on-error: true

      - name: Run smoke widget test
        run: flutter test test/widget_test.dart --reporter compact
        continue-on-error: true

      - name: Run all tests with coverage
        run: flutter test --coverage --reporter json > test-results.json
        continue-on-error: true

      - name: Generate coverage summary
        run: |
          if [ -f coverage/lcov.info ]; then
            echo "=== Coverage Summary ==="
            awk '/^SF:/{file=$0} /^DA:/{lines++; if($0~/,0$/){missed++}} END{
              covered=lines-missed;
              if(lines>0) printf "Lines: %d/%d (%.1f%%)\n", covered, lines, covered/lines*100
            }' coverage/lcov.info || true
          fi

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-results-${{ github.run_number }}
          path: |
            test-results.json
            coverage/lcov.info

      - name: Pretty print results summary
        if: always()
        run: flutter test test/all_tests.dart --reporter compact || true

      - name: Post PR comment on failure
        if: failure() && github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: '❌ **Unit/Widget tests failed** on this PR.\n\nCheck the [Actions log](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for details.'
            });
