name: Maestro UI Tests

on:
  # Nightly at 1 AM UTC
  schedule:
    - cron: '0 1 * * *'

  # Manual trigger with optional flow selection
  workflow_dispatch:
    inputs:
      flow:
        description: 'Flow folder (e.g. 04_transport). Leave empty for all.'
        required: false
        default: ''
      run_smoke_only:
        description: 'Run smoke tests only?'
        type: boolean
        default: false

  # Run smoke on every PR
  pull_request:
    branches: [main]

jobs:
  maestro-ui-tests:
    name: Maestro UI Tests
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        run: |
          git clone https://github.com/flutter/flutter.git -b stable --depth 1 "$HOME/flutter"
          echo "$HOME/flutter/bin" >> $GITHUB_PATH
          export PATH="$HOME/flutter/bin:$PATH"
          flutter precache --android
          flutter --version

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: pip install lxml jinja2 pillow anthropic requests

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Restore google-services.json from secret
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d > android/app/google-services.json

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Determine flows to run
        id: flows
        run: |
          if [ "${{ github.event.inputs.run_smoke_only }}" = "true" ] || \
             [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "path=maestro/flows/00_smoke" >> $GITHUB_OUTPUT
            echo "label=smoke" >> $GITHUB_OUTPUT
          elif [ -n "${{ github.event.inputs.flow }}" ]; then
            echo "path=maestro/flows/${{ github.event.inputs.flow }}" >> $GITHUB_OUTPUT
            echo "label=${{ github.event.inputs.flow }}" >> $GITHUB_OUTPUT
          else
            echo "path=maestro/flows" >> $GITHUB_OUTPUT
            echo "label=full" >> $GITHUB_OUTPUT
          fi

      - name: Run tests on Android emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 31
          target: default
          arch: x86_64
          force-avd-creation: true
          emulator-options: -no-window -gpu swiftshader_indirect -noaudio -no-boot-anim -no-snapshot
          disable-animations: true
          script: |
            adb install build/app/outputs/flutter-apk/app-debug.apk
            adb logcat -v threadtime > logcat.txt &
            maestro test "${{ steps.flows.outputs.path }}" --format junit --output results.xml --screenshots-dir screenshots --env FARMERAPP_TEST_PHONE="${{ secrets.FARMERAPP_TEST_PHONE }}" --env FARMERAPP_TEST_OTP="${{ secrets.FARMERAPP_TEST_OTP }}" --env FARMERAPP_TEST_EMAIL="${{ secrets.FARMERAPP_TEST_EMAIL }}" --env FARMERAPP_TEST_PASSWORD="${{ secrets.FARMERAPP_TEST_PASSWORD }}" 2>&1 | tee maestro.log; MAESTRO_EXIT=${PIPESTATUS[0]}
            kill %1 2>/dev/null || true
            grep -E "FATAL EXCEPTION|AndroidRuntime|ANR in|FlutterError" logcat.txt > crashes.txt 2>/dev/null || true
            exit $MAESTRO_EXIT

      - name: Generate HTML report
        if: always()
        run: python3 scripts/generate_report.py .

      - name: Upload test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results-${{ steps.flows.outputs.label }}-${{ github.run_number }}
          path: |
            results.xml
            report.html
            summary.json
            logcat.txt
            crashes.txt
            maestro.log
            screenshots/

      - name: Post PR comment with results
        if: github.event_name == 'pull_request' && always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let summary;
            try {
              summary = JSON.parse(fs.readFileSync('summary.json', 'utf8'));
            } catch(e) {
              summary = { total: 0, passed: 0, failed: 0, crashes: 0, result: 'ERROR' };
            }
            const icon = summary.result === 'PASS' ? '✅' : '❌';
            const body = [
              `## ${icon} UI Test Results — ${{ steps.flows.outputs.label }}`,
              '',
              '| Metric | Count |',
              '|--------|-------|',
              `| Total Tests | ${summary.total} |`,
              `| ✅ Passed | ${summary.passed} |`,
              `| ❌ Failed | ${summary.failed} |`,
              `| ⚡ Crash Lines | ${summary.crashes} |`,
              '',
              `[View full report](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})`,
            ].join('\n');

            await github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body
            });

      - name: Fail workflow if tests failed
        if: always()
        run: |
          FAILED=$(python3 -c "
          import json, sys
          try:
            d = json.load(open('summary.json'))
            print(d.get('failed', 0))
          except:
            print(0)
          ")
          echo "Failed tests: $FAILED"
          exit $FAILED
