name: Nightly Full Test Suite

on:
  # Nightly at 02:00 UTC
  schedule:
    - cron: '0 2 * * *'

  # Manual trigger
  workflow_dispatch:
    inputs:
      skip_ui:
        description: 'Skip Maestro UI tests (faster)?'
        type: boolean
        default: false
      skip_flutter:
        description: 'Skip Flutter unit/widget tests?'
        type: boolean
        default: false

jobs:
  # ──────────────────────────────────────────────────────────────────────────
  # Job 1: Flutter unit + widget tests
  # ──────────────────────────────────────────────────────────────────────────
  flutter-tests:
    name: Flutter Unit & Widget Tests
    runs-on: ubuntu-latest
    if: ${{ github.event.inputs.skip_flutter != 'true' }}

    steps:
      - name: Checkout FarmerApp-TestSuite
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Restore google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d \
            > android/app/google-services.json

      - name: Install dependencies
        run: flutter pub get

      - name: Generate mocks
        run: dart run build_runner build --delete-conflicting-outputs
        continue-on-error: true

      - name: Run unit tests
        run: |
          flutter test test/unit/ \
            --reporter json \
            --file-reporter json:flutter-unit-results.json \
            2>&1 | tee flutter-unit.log
        continue-on-error: true

      - name: Run widget tests
        run: |
          flutter test test/widget/ \
            --reporter json \
            --file-reporter json:flutter-widget-results.json \
            2>&1 | tee flutter-widget.log
        continue-on-error: true

      - name: Run all tests with coverage
        run: |
          flutter test --coverage \
            --reporter json \
            --file-reporter json:flutter-all-results.json \
            2>&1 | tee flutter-coverage.log || true
        continue-on-error: true

      - name: Convert Flutter JSON results → JUnit XML
        run: |
          python3 - <<'PYEOF'
          import json, pathlib, sys
          from xml.etree.ElementTree import Element, SubElement, ElementTree, indent

          for src_name, suite_name in [
            ('flutter-unit-results.json',   'FlutterUnit'),
            ('flutter-widget-results.json', 'FlutterWidget'),
          ]:
            src = pathlib.Path(src_name)
            if not src.exists():
              continue
            lines = [l for l in src.read_text().splitlines() if l.strip()]
            events = []
            for line in lines:
              try:
                events.append(json.loads(line))
              except json.JSONDecodeError:
                pass

            root = Element('testsuites')
            suite = SubElement(root, 'testsuite', name=suite_name)
            for ev in events:
              if ev.get('type') == 'testDone':
                tc = SubElement(suite, 'testcase',
                  name=ev.get('testID', 'unknown'),
                  classname=suite_name,
                  time=str(ev.get('time', 0) / 1000.0))
                if ev.get('result') == 'error':
                  f = SubElement(tc, 'failure')
                  f.text = ev.get('error', '')
                elif ev.get('skipped'):
                  SubElement(tc, 'skipped')
            indent(root, space='  ')
            out = pathlib.Path(src_name.replace('.json', '.xml'))
            ElementTree(root).write(str(out), encoding='unicode', xml_declaration=True)
            print(f'Wrote {out}')
          PYEOF
        continue-on-error: true

      - name: Merge Flutter JUnit XMLs
        run: |
          python3 - <<'PYEOF'
          import pathlib, xml.etree.ElementTree as ET
          from xml.etree.ElementTree import Element, SubElement, ElementTree, indent

          merged = Element('testsuites')
          for f in pathlib.Path('.').glob('flutter-*-results.xml'):
            try:
              root = ET.parse(f).getroot()
              for suite in (root if root.tag == 'testsuites' else [root]):
                merged.append(suite)
            except Exception as e:
              print(f'Skipping {f}: {e}')

          indent(merged, space='  ')
          ElementTree(merged).write('flutter-results.xml',
            encoding='unicode', xml_declaration=True)
          print('Merged flutter-results.xml')
          PYEOF
        continue-on-error: true

      - name: Upload Flutter artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: flutter-test-results-${{ github.run_number }}
          path: |
            flutter-results.xml
            flutter-unit-results.json
            flutter-widget-results.json
            flutter-unit.log
            flutter-widget.log
            flutter-coverage.log
            coverage/lcov.info

  # ──────────────────────────────────────────────────────────────────────────
  # Job 2: Django backend tests (calls FarmerApp-Backend workflow via API
  #          or re-runs tests inline using the backend repo)
  # ──────────────────────────────────────────────────────────────────────────
  backend-tests:
    name: Django Backend Tests
    runs-on: ubuntu-latest

    env:
      SECRET_KEY: ci-nightly-secret-key-not-for-production
      DEBUG: "True"

    steps:
      - name: Checkout FarmerApp-Backend
        uses: actions/checkout@v4
        with:
          repository: metamersisttech/FarmerApp-Backend
          token: ${{ secrets.GH_PAT }}
          path: backend

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt coverage

      - name: Run all tests
        working-directory: backend
        run: |
          python manage.py test core auth_app listings appointments \
            --verbosity=2 2>&1 | tee backend-tests.log

      - name: Generate coverage
        working-directory: backend
        run: |
          coverage run --source='.' manage.py test \
            core auth_app listings appointments --verbosity=1
          coverage xml -o coverage.xml || true
          coverage report --skip-covered \
            --omit='*/migrations/*,*/tests.py,farmerApp/*' || true
        continue-on-error: true

      - name: Convert coverage report to JUnit-like XML
        working-directory: backend
        run: |
          python3 - <<'PYEOF'
          """Synthesize a JUnit XML from Django test output log."""
          import re, pathlib
          from xml.etree.ElementTree import Element, SubElement, ElementTree, indent

          log = pathlib.Path('backend-tests.log').read_text(errors='replace')
          root = Element('testsuites')
          suite = SubElement(root, 'testsuite', name='DjangoBackend')

          # Match lines like: "test_something (app.tests.TestClass.test_something) ... ok"
          pattern = re.compile(
            r'^(test\w+)\s+\([\w.]+\)\s+.*?\s+(ok|FAIL|ERROR|skip)',
            re.MULTILINE
          )
          for m in pattern.finditer(log):
            name, result = m.group(1), m.group(2)
            tc = SubElement(suite, 'testcase', name=name, classname='DjangoBackend')
            if result in ('FAIL', 'ERROR'):
              SubElement(tc, 'failure', message=result)
            elif result == 'skip':
              SubElement(tc, 'skipped')

          indent(root, space='  ')
          ElementTree(root).write('../backend-results.xml',
            encoding='unicode', xml_declaration=True)
          print('Written backend-results.xml')
          PYEOF
        continue-on-error: true

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-test-results-${{ github.run_number }}
          path: |
            backend/coverage.xml
            backend/backend-tests.log
            backend-results.xml

  # ──────────────────────────────────────────────────────────────────────────
  # Job 3: Maestro UI tests (skippable)
  # ──────────────────────────────────────────────────────────────────────────
  ui-tests:
    name: Maestro UI Tests
    runs-on: macos-latest
    timeout-minutes: 90
    if: ${{ github.event.inputs.skip_ui != 'true' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python packages
        run: pip install lxml jinja2 pillow requests

      - name: Install Maestro
        run: |
          curl -Ls "https://get.maestro.mobile.dev" | bash
          echo "$HOME/.maestro/bin" >> $GITHUB_PATH

      - name: Restore google-services.json
        run: |
          echo "${{ secrets.GOOGLE_SERVICES_JSON_B64 }}" | base64 -d \
            > android/app/google-services.json

      - name: Install Flutter dependencies
        run: flutter pub get

      - name: Build debug APK
        run: flutter build apk --debug

      - name: Run Maestro UI tests
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 6
          disable-animations: true
          script: |
            adb install build/app/outputs/flutter-apk/app-debug.apk

            adb logcat -v threadtime > logcat.txt &
            LOGCAT_PID=$!

            maestro test maestro/flows \
              --format junit \
              --output results.xml \
              --screenshots-dir screenshots \
              --env FARMERAPP_TEST_PHONE="${{ secrets.FARMERAPP_TEST_PHONE }}" \
              --env FARMERAPP_TEST_OTP="${{ secrets.FARMERAPP_TEST_OTP }}" \
              --env FARMERAPP_TEST_EMAIL="${{ secrets.FARMERAPP_TEST_EMAIL }}" \
              --env FARMERAPP_TEST_PASSWORD="${{ secrets.FARMERAPP_TEST_PASSWORD }}" \
              2>&1 | tee maestro.log

            RESULT=${PIPESTATUS[0]}
            kill $LOGCAT_PID 2>/dev/null || true

            grep -E "FATAL EXCEPTION|AndroidRuntime|ANR in|FlutterError" \
              logcat.txt > crashes.txt 2>/dev/null || true
            exit $RESULT

      - name: Upload UI test artifacts
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: ui-test-results-nightly-${{ github.run_number }}
          path: |
            results.xml
            maestro.log
            logcat.txt
            crashes.txt
            screenshots/

  # ──────────────────────────────────────────────────────────────────────────
  # Job 4: Unified report (depends on all test jobs)
  # ──────────────────────────────────────────────────────────────────────────
  unified-report:
    name: Generate Unified Report
    runs-on: ubuntu-latest
    needs: [flutter-tests, backend-tests, ui-tests]
    if: always()

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Download Flutter artifacts
        uses: actions/download-artifact@v4
        with:
          name: flutter-test-results-${{ github.run_number }}
          path: artifacts/flutter
        continue-on-error: true

      - name: Download backend artifacts
        uses: actions/download-artifact@v4
        with:
          name: backend-test-results-${{ github.run_number }}
          path: artifacts/backend
        continue-on-error: true

      - name: Download UI test artifacts
        uses: actions/download-artifact@v4
        with:
          name: ui-test-results-nightly-${{ github.run_number }}
          path: artifacts/ui
        continue-on-error: true

      - name: Assemble artifacts
        run: |
          cp artifacts/ui/results.xml results.xml 2>/dev/null || touch results.xml
          cp artifacts/flutter/flutter-results.xml flutter-results.xml 2>/dev/null || touch flutter-results.xml
          cp artifacts/backend/backend-results.xml backend-results.xml 2>/dev/null || touch backend-results.xml
          cp artifacts/backend/coverage.xml coverage.xml 2>/dev/null || touch coverage.xml
          mkdir -p screenshots
          cp -r artifacts/ui/screenshots/. screenshots/ 2>/dev/null || true

      - name: Generate unified report
        run: |
          python3 scripts/generate_unified_report.py \
            --maestro results.xml \
            --flutter flutter-results.xml \
            --backend backend-results.xml \
            --coverage coverage.xml \
            --screenshots screenshots \
            --output unified_report.html \
            --summary unified_summary.json

      - name: Upload unified report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unified-test-report-${{ github.run_number }}
          path: |
            unified_report.html
            unified_summary.json

      - name: Post nightly summary as GitHub Job Summary
        if: always()
        run: |
          python3 - <<'PYEOF'
          import json, pathlib, sys

          try:
            s = json.loads(pathlib.Path('unified_summary.json').read_text())
          except Exception:
            s = {'result': 'ERROR', 'total': 0, 'passed': 0, 'failed': 0,
                 'skipped': 0, 'suites': {}, 'coverage': {}}

          icon = '✅' if s['result'] == 'PASS' else '❌'
          lines = [
            f'# {icon} Nightly Test Report — {s.get("timestamp", "")}',
            '',
            '| Suite | Total | Passed | Failed |',
            '|-------|------:|-------:|-------:|',
          ]
          for name, key in [
            ('Maestro UI',    'maestro'),
            ('Flutter Unit',  'flutter'),
            ('Django Backend','backend'),
          ]:
            d = s.get('suites', {}).get(key, {})
            lines.append(
              f'| {name} | {d.get("total",0)} | {d.get("passed",0)} '
              f'| {d.get("failed",0)} |'
            )

          lines += [
            '',
            '## Totals',
            f'- **Total**: {s["total"]}',
            f'- **Passed**: {s["passed"]}',
            f'- **Failed**: {s["failed"]}',
            f'- **Skipped**: {s["skipped"]}',
            '',
          ]
          cov = s.get('coverage', {})
          if cov:
            lines += [
              '## Backend Coverage',
              f'- Line: **{cov.get("line_rate", 0):.1f}%**',
              f'- Branch: **{cov.get("branch_rate", 0):.1f}%**',
            ]

          summary_file = pathlib.Path(
            __import__('os').environ.get('GITHUB_STEP_SUMMARY', '/dev/null')
          )
          summary_file.write_text('\n'.join(lines), encoding='utf-8')
          print('Job summary written.')
          PYEOF

      - name: Fail if any tests failed
        if: always()
        run: |
          FAILED=$(python3 -c "
          import json, pathlib
          try:
            d = json.loads(pathlib.Path('unified_summary.json').read_text())
            print(d.get('failed', 0))
          except:
            print(0)
          ")
          echo "Total failed: $FAILED"
          [ "$FAILED" -eq 0 ]
