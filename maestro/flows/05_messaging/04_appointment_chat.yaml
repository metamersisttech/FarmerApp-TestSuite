# Messaging 04 — Chat within an appointment context

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to appointments
- tapOn:
    text: "Appointments"
    optional: true
- tapOn:
    text: "My Appointments"
    optional: true
- waitForAnimationToEnd:
    timeout: 6000

# Open first appointment
- tapOn:
    index: 0
    id: "appointment_item"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: msg_04_appointment_detail

# Open appointment chat
- tapOn:
    text: "Chat"
    optional: true
- tapOn:
    text: "Message Vet"
    optional: true
- tapOn:
    text: "Message"
    optional: true
- tapOn:
    id: "chat_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: msg_04_appointment_chat

- assertNotVisible:
    text: "Unfortunately"

# Send a message
- tapOn:
    text: "Type a message"
    optional: true
- tapOn:
    id: "message_input"
    optional: true
- inputText: "Hello, I have a question about the appointment"

- tapOn:
    text: "Send"
    optional: true
- tapOn:
    id: "send_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000

- takeScreenshot: msg_04_message_sent

- pressKey: back
- waitForAnimationToEnd
