# Test pull-to-refresh on conversations list
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Messages"
    optional: true
- tapOn:
    text: "Conversations"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: messaging_05_conversations_loaded
- swipe:
    direction: DOWN
    duration: 500
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: messaging_05_after_refresh
- assertVisible:
    text: "Messages"
    optional: true
