# Messaging 03 — Send a message in direct chat

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Messages"
    optional: true
- tapOn:
    text: "Conversations"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    index: 0
    id: "conversation_item"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: messaging_03_before_send
- tapOn:
    id: "message_input"
    optional: true
- tapOn:
    text: "Type a message"
    optional: true
- inputText: "Hello, this is a test message"
- takeScreenshot: messaging_03_typed
- tapOn:
    id: "send_btn"
    optional: true
- tapOn:
    description: "Send"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: messaging_03_after_send
- pressKey: back
- waitForAnimationToEnd
