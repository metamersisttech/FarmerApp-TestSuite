# Messaging 02 — Open a direct chat conversation
#
# Key facts from source:
#   ConversationTile: InkWell with dynamic key "conversation_tile_{id}" — use index tap
#   CustomBottomNavBar: icon-only, Profile tab key: "nav_profile"
#   DirectChatScreen: shows messages + input area

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to Profile tab (icon-only bottom nav)
- tapOn:
    id: "nav_profile"
    optional: true
- waitForAnimationToEnd

# Tap Messages menu item
- tapOn:
    text: "Messages"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: messaging_02_conversations

# Tap first conversation row if any exist (dynamic key, use index)
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: messaging_02_chat_open

- pressKey: back
- waitForAnimationToEnd
