# Messaging 02 — Open a direct chat conversation

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Messages"
    optional: true
- tapOn:
    text: "Chat"
    optional: true
- tapOn:
    text: "Conversations"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: messaging_02_conversations
# Tap first conversation if any
- tapOn:
    index: 0
    id: "conversation_item"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: messaging_02_chat_open
- pressKey: back
- waitForAnimationToEnd
