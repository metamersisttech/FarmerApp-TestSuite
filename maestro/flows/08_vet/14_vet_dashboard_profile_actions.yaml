# Test vet dashboard profile: availability card, switch mode, logout
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Vet Home"
    optional: true
- tapOn:
    text: "Vet Dashboard"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
# Navigate to vet profile page
- tapOn:
    text: "My Profile"
    optional: true
- tapOn:
    text: "Profile"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: vet_14_dashboard_profile
# Tap availability status card (shows current availability)
- tapOn:
    id: "availability_status_card"
    optional: true
- tapOn:
    text: "Currently Available"
    optional: true
- tapOn:
    text: "Currently Unavailable"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: vet_14_availability_tapped
# Tap Switch to Farmer Mode card
- tapOn:
    id: "switch_mode_card"
    optional: true
- tapOn:
    text: "Switch to Farmer Mode"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: vet_14_switch_mode_tapped
- pressKey: back
- waitForAnimationToEnd
# Tap Logout button
- tapOn:
    text: "Logout"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: vet_14_logout_dialog
- tapOn:
    text: "No"
    optional: true
- tapOn:
    text: "Cancel"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: vet_14_logout_dismissed
