# Test vet dashboard profile: availability toggle, logout, switch mode
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Profile"
    optional: true
- tapOn:
    text: "Dashboard"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: vet_14_dashboard
- tapOn:
    id: availability_toggle
    optional: true
- tapOn:
    text: "Available"
    optional: true
- tapOn:
    description: "Toggle availability"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: vet_14_availability_toggled
- tapOn:
    id: availability_toggle
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    text: "Switch"
    optional: true
- tapOn:
    id: switch_mode_card
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: vet_14_switch_mode_tapped
- pressKey:
    key: back
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Logout"
    optional: true
- tapOn:
    id: logout_btn
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: vet_14_logout_dialog
- tapOn:
    text: "No"
    optional: true
- tapOn:
    text: "Cancel"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: vet_14_logout_dismissed
