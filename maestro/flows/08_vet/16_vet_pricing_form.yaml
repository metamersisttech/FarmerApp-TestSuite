# Test all 4 fee fields and Save Pricing on vet pricing screen
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Vet Home"
    optional: true
- tapOn:
    text: "Vet Dashboard"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Pricing"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: vet_16_pricing_screen
- assertVisible:
    text: "Manage Pricing"
    optional: true
# Fill In-Clinic Consultation fee field (using hint text)
- tapOn:
    text: "e.g., 500"
    optional: true
- clearText:
    optional: true
- inputText: "500"
# Fill Video Consultation fee
- tapOn:
    text: "e.g., 400"
    optional: true
- clearText:
    optional: true
- inputText: "400"
# Fill Home Visit fee
- tapOn:
    text: "e.g., 1000"
    optional: true
- clearText:
    optional: true
- inputText: "800"
# Fill Emergency Multiplier
- tapOn:
    text: "e.g., 1.5"
    optional: true
- clearText:
    optional: true
- inputText: "1.5"
- takeScreenshot: vet_16_fields_filled
# Tap Save Pricing button
- tapOn:
    id: "save_pricing_btn"
    optional: true
- tapOn:
    text: "Save Pricing"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: vet_16_pricing_saved
