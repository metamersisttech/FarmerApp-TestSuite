# Vet Home Page — vet user logs in and sees the vet home dashboard

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Assert vet home page key elements are visible
- assertVisible:
    text: "Appointments"
    optional: true
- assertVisible:
    text: "Upcoming"
    optional: true

- takeScreenshot: vet_08_vet_home

# Tap "View Appointments" or first appointment card
- tapOn:
    text: "View Appointments"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Appointments"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: vet_08_home_appointments_tapped

# Go back to vet home
- pressKey: back
- waitForAnimationToEnd

- takeScreenshot: vet_08_vet_home_back
