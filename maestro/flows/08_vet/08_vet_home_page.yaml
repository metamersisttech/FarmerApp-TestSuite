# Vet Home Page — vet user logs in and sees the vet home dashboard

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Assert vet home page key elements are visible
- assertVisible:
    text: "Quick Actions"
    optional: true
- assertVisible:
    text: "Recent Appointments"
    optional: true

- takeScreenshot: vet_08_vet_home

# Tap View All appointments
- tapOn:
    id: "view_all_appointments_btn"
    optional: true
- tapOn:
    text: "View All"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: vet_08_home_appointments_tapped

# Go back to vet home
- pressKey: back
- waitForAnimationToEnd

- takeScreenshot: vet_08_vet_home_back
