# Vet Detail Interactions — farmer views vet detail page, taps Call, sees availability calendar

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to Vet Services
- tapOn:
    text: "Vet Services"
    optional: true
- tapOn:
    text: "Vet"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Tap first vet card to open detail page
- tapOn:
    id: "vet_card"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: vet_10_vet_detail

# Scroll down to see more details
- swipe:
    direction: UP
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: vet_10_scrolled

# Tap Book Appointment button in bottom action bar
- tapOn:
    id: "vet_detail_book_btn"
    optional: true
- tapOn:
    text: "Book Appointment"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: vet_10_book_tapped

- pressKey: back
- waitForAnimationToEnd
