# Vet Document Re-upload — vet with rejected documents re-uploads via vet_document_reupload_screen

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to verification status
- tapOn:
    text: "Verification Status"
    optional: true
- tapOn:
    text: "Profile"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: vet_09_verification_status

# Tap Resubmit Documents (only shown in rejected state)
- tapOn:
    id: "resubmit_documents_btn"
    optional: true
- tapOn:
    text: "Resubmit Documents"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: vet_09_reupload_screen

# Verify resubmit screen title
- assertVisible:
    text: "Resubmit Documents"
    optional: true

# Tap upload area for rejected vet certificate
- tapOn:
    text: "Tap to upload new Vet Certificate"
    optional: true
- tapOn:
    text: "Upload new document:"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: vet_09_upload_tapped

# Cancel out of file picker
- pressKey: back
- waitForAnimationToEnd

- takeScreenshot: vet_09_after_cancel
