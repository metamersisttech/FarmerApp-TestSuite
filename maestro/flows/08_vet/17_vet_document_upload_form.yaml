# Test vet document upload form: all text fields, both image pickers, submit
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Become a Vet"
    optional: true
- tapOn:
    text: "Register as Vet"
    optional: true
- tapOn:
    text: "Document Upload"
    optional: true
- tapOn:
    text: "Vet Registration"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: vet_17_upload_form
# Fill Registration Number
- tapOn:
    text: "e.g., VET-MH-2024-12345"
    optional: true
- inputText: "VET123456"
# Fill Qualifications
- tapOn:
    text: "e.g., BVSc, MVSc (Surgery)"
    optional: true
- inputText: "BVSc, MVSc"
# Fill Clinic Name
- tapOn:
    text: "e.g., Green Valley Veterinary Clinic"
    optional: true
- inputText: "Test Animal Clinic"
# Fill College Name
- tapOn:
    text: "e.g., Mumbai Veterinary College"
    optional: true
- inputText: "Mumbai Vet College"
# Fill Specialization (optional)
- tapOn:
    text: "e.g., Large Animals, Surgery"
    optional: true
- inputText: "General Practice"
- takeScreenshot: vet_17_fields_filled
# Tap vet certificate upload area
- tapOn:
    text: "Upload Vet Certificate"
    optional: true
- tapOn:
    text: "Tap to upload certificate image"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: vet_17_cert_picker
- pressKey: back
- waitForAnimationToEnd
# Tap degree certificate upload area
- tapOn:
    text: "Upload Degree Certificate"
    optional: true
- tapOn:
    text: "Tap to upload degree image"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: vet_17_degree_picker
- pressKey: back
- waitForAnimationToEnd
# Tap Submit for Verification button
- tapOn:
    id: "submit_for_verification_btn"
    optional: true
- tapOn:
    text: "Submit for Verification"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: vet_17_after_submit
