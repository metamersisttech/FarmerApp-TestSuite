# Vet 06 — Vet pricing screen

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Pricing"
    optional: true
- tapOn:
    text: "Set Pricing"
    optional: true
- tapOn:
    text: "Manage Pricing"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: vet_06_pricing
- assertVisible:
    text: "Manage Pricing"
    optional: true
# Enter a consultation fee value
- tapOn:
    text: "In-Clinic Consultation"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "e.g., 500"
    optional: true
- inputText: "500"
- takeScreenshot: vet_06_pricing_filled
- pressKey: back
- waitForAnimationToEnd
