# Test add slot, edit slot, delete slot, and time picker on vet availability screen
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Availability"
    optional: true
- tapOn:
    id: availability_quick_action
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: vet_15_availability_screen
- tapOn:
    description: "Add availability"
    optional: true
- tapOn:
    id: add_slot_btn
    optional: true
- tapOn:
    text: "Add"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: vet_15_add_slot_sheet
- tapOn:
    id: day_dropdown
    optional: true
- tapOn:
    text: "Day"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    index: 1
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: start_time_picker
    optional: true
- tapOn:
    text: "Start Time"
    optional: true
- tapOn:
    description: "Start time"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: vet_15_time_picker
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    text: "Confirm"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    text: "Save"
    optional: true
- tapOn:
    id: save_slot_btn
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: vet_15_slot_saved
- tapOn:
    id: edit_slot_btn
    index: 0
    optional: true
- tapOn:
    description: "Edit slot"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: vet_15_edit_slot
- pressKey:
    key: back
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: delete_slot_btn
    index: 0
    optional: true
- tapOn:
    description: "Delete slot"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: vet_15_delete_dialog
- tapOn:
    text: "No"
    optional: true
- tapOn:
    text: "Cancel"
    optional: true
- waitForAnimationToEnd
