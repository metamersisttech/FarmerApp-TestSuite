# Test add slot, edit slot, delete slot, and time picker on vet availability screen
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Vet Home"
    optional: true
- tapOn:
    text: "Vet Dashboard"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Availability"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: vet_15_availability_screen
# Tap Add Availability for first day (Monday = day 0)
- tapOn:
    text: "Add Availability"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: vet_15_add_slot_sheet
# Sheet shows: Add Availability title, day dropdown, Start Time, End Time, Save button
- assertVisible:
    text: "Add Availability"
    optional: true
# Select day from dropdown
- tapOn:
    text: "Day of Week"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
# Pick Monday
- tapOn:
    text: "Monday"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
# Tap Start Time picker tile
- tapOn:
    text: "Start Time"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: vet_15_time_picker
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    text: "Cancel"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
# Tap Save button in sheet
- tapOn:
    text: "Save"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: vet_15_slot_saved
# Edit an existing slot using edit icon button
- tapOn:
    text: "Edit"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: vet_15_edit_slot
- pressKey: back
- waitForAnimationToEnd
# Delete slot using delete icon button
- tapOn:
    text: "Delete"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: vet_15_delete_dialog
# Dismiss delete dialog
- tapOn:
    text: "Cancel"
    optional: true
- tapOn:
    text: "No"
    optional: true
- waitForAnimationToEnd
