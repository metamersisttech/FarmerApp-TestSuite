# Test Call, Video, Chat buttons on vet cards in the vet services list
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Vet Services"
    optional: true
- tapOn:
    text: "Vet"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: vet_11_services_list
# Tap Book button on first vet card
- tapOn:
    id: "vet_card_book_btn"
    index: 0
    optional: true
- tapOn:
    text: "Book"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: vet_11_book_tapped
- pressKey: back
- waitForAnimationToEnd
# Tap vet card to view detail
- tapOn:
    id: "vet_card"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: vet_11_vet_detail
- pressKey: back
- waitForAnimationToEnd
