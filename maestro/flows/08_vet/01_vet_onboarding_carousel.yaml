# Vet 01 — Vet onboarding carousel renders

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Become a Vet"
    optional: true
- tapOn:
    text: "Register as Vet"
    optional: true
- tapOn:
    text: "Vet Onboarding"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: vet_01_onboarding_carousel
# Tap Next to advance slides
- tapOn:
    id: "onboarding_next_btn"
    optional: true
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: vet_01_carousel_slide2
# Tap Skip
- tapOn:
    id: "onboarding_skip_btn"
    optional: true
- tapOn:
    text: "Skip"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- pressKey: back
- waitForAnimationToEnd
