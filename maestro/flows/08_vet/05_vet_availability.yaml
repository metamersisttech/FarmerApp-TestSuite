# Vet 05 — Vet availability screen

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Availability"
    optional: true
- tapOn:
    text: "Set Availability"
    optional: true
- tapOn:
    text: "Manage Availability"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: vet_05_availability
- assertVisible:
    text: "Manage Availability"
    optional: true
- pressKey: back
- waitForAnimationToEnd
