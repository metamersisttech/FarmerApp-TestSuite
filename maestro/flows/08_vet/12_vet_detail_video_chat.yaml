# Test Book Appointment button in vet detail page BottomActionBar
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Vet Services"
    optional: true
- tapOn:
    text: "Vet"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    id: "vet_card"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: vet_12_vet_detail
# Tap Book Appointment in bottom action bar
- tapOn:
    id: "vet_detail_book_btn"
    optional: true
- tapOn:
    text: "Book Appointment"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: vet_12_book_tapped
- pressKey: back
- waitForAnimationToEnd
