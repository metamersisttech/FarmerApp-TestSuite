# Test Video and Chat buttons in vet detail page BottomActionBar
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Vet Services"
    optional: true
- waitForAnimationToEnd
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: vet_12_vet_detail
- tapOn:
    text: "Video"
    optional: true
- tapOn:
    id: video_btn
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: vet_12_video_tapped
- pressKey:
    key: back
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Chat"
    optional: true
- tapOn:
    id: chat_btn
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: vet_12_chat_tapped
- pressKey:
    key: back
    optional: true
