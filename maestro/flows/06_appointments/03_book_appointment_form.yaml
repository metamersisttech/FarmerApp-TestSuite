# Appointments 03 — Book appointment form

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Vet Services"
    optional: true
- tapOn:
    text: "Find a Vet"
    optional: true
- tapOn:
    text: "Vet"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    id: "vet_card"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    id: "vet_detail_book_btn"
    optional: true
- tapOn:
    text: "Book Appointment"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_03_book_form
# Select In-Person consultation mode
- tapOn:
    text: "In-Person"
    optional: true
- waitForAnimationToEnd
# Tap the request button
- tapOn:
    id: "request_appointment_btn"
    optional: true
- tapOn:
    text: "Request Appointment"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_03_form_submitted
- pressKey: back
- waitForAnimationToEnd
