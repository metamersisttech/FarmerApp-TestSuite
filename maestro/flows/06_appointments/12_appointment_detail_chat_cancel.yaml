# Test Chat button and Cancel button (with AlertDialog) on appointment detail screen
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "My Appointments"
    optional: true
- tapOn:
    text: "Appointments"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    id: "appointment_card"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_12_detail
# Tap Chat button (bottom action bar)
- tapOn:
    id: "appointment_detail_chat_btn"
    optional: true
- tapOn:
    text: "Chat"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: appt_12_chat_opened
- pressKey: back
- waitForAnimationToEnd
# Tap Cancel button (bottom action bar)
- tapOn:
    id: "appointment_detail_cancel_btn"
    optional: true
- tapOn:
    text: "Cancel"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: appt_12_cancel_dialog
# Dismiss cancel dialog
- tapOn:
    text: "No"
    optional: true
- tapOn:
    text: "Back"
    optional: true
- tapOn:
    text: "Keep"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: appt_12_cancel_dismissed
