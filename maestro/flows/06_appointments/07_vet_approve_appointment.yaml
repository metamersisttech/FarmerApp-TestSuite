# Appointments 07 — Vet approves a pending appointment

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

- tapOn:
    text: "Vet Home"
    optional: true
- tapOn:
    text: "Vet Dashboard"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

- tapOn:
    text: "Appointments"
    optional: true
- waitForAnimationToEnd:
    timeout: 6000

- takeScreenshot: appt_07_vet_appointments

# Tap Approve on first pending appointment card
- tapOn:
    text: "Approve"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: appt_07_approve_screen

# Select a date — tap a date number in the calendar
- tapOn:
    text: "20"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: appt_07_date_selected

# Select first available time slot
- tapOn:
    text: "Select Time Slot"
    optional: true
- waitForAnimationToEnd

# Tap Confirm Appointment button
- tapOn:
    id: "confirm_appointment_btn"
    optional: true
- tapOn:
    text: "Confirm Appointment"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

- takeScreenshot: appt_07_after_approve
