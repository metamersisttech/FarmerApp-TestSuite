# Appointments 09 — Vet marks an appointment as completed

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

- tapOn:
    text: "Vet Home"
    optional: true
- tapOn:
    text: "Vet Dashboard"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

- tapOn:
    text: "Appointments"
    optional: true
- waitForAnimationToEnd:
    timeout: 6000

- takeScreenshot: appt_09_vet_appointments

# Tap Complete on a confirmed appointment card
- tapOn:
    text: "Complete"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: appt_09_complete_screen

# Fill prescription (required field)
- tapOn:
    text: "Medication, dosage, instructions..."
    optional: true
- inputText: "Administer antibiotic twice daily for 5 days"

# Fill optional notes
- tapOn:
    text: "Follow-up visit, diet changes, etc..."
    optional: true
- inputText: "Patient is recovering well"

- takeScreenshot: appt_09_fields_filled

# Tap Mark as Complete button
- tapOn:
    id: "mark_complete_btn"
    optional: true
- tapOn:
    text: "Mark as Complete"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

- takeScreenshot: appt_09_after_complete

- assertNotVisible:
    text: "Unfortunately"
