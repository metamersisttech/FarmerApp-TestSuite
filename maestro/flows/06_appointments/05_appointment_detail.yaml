# Appointments 05 — Appointment detail screen

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "My Appointments"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    index: 0
    id: "appointment_item"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_05_appointment_detail
- pressKey: back
- waitForAnimationToEnd
