# Appointments 05 — Appointment detail screen

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "My Appointments"
    optional: true
- tapOn:
    text: "Appointments"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    id: "appointment_card"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_05_appointment_detail
- assertVisible:
    text: "Appointment Details"
    optional: true
- pressKey: back
- waitForAnimationToEnd
