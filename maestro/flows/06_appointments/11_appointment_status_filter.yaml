# Appointments 11: Filter appointments list by different statuses

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to My Appointments
- tapOn:
    text: "My Appointments"
    optional: true
- tapOn:
    text: "Appointments"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Tap Confirmed filter chip
- tapOn:
    text: "Confirmed"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: appt_11_filter_confirmed

# Tap Cancelled filter chip
- tapOn:
    text: "Cancelled"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: appt_11_filter_cancelled

# Tap All filter chip to reset
- tapOn:
    text: "All"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: appt_11_filter_all

- pressKey: back
- waitForAnimationToEnd
