# Test CalendarDatePicker and TimeSlotGrid on approve appointment screen (vet perspective)
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Vet Home"
    optional: true
- tapOn:
    text: "Vet Dashboard"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    text: "Appointments"
    optional: true
- waitForAnimationToEnd:
    timeout: 6000
# Tap Approve on first appointment in the list
- tapOn:
    text: "Approve"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_13_approve_screen
# Select a date from the calendar
- tapOn:
    text: "20"
    optional: true
- tapOn:
    text: "15"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: appt_13_date_selected
# Select the first available time slot
- tapOn:
    text: "Select Time Slot"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: appt_13_time_selected
# Confirm appointment
- tapOn:
    id: "confirm_appointment_btn"
    optional: true
- tapOn:
    text: "Confirm Appointment"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_13_after_confirm
