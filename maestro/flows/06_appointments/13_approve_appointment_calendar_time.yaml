# Test CalendarDatePicker and TimeSlotGrid on approve appointment screen (vet perspective)
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Vet Appointments"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "REQUESTED"
    optional: true
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Approve"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_13_approve_screen
- tapOn:
    id: calendar_date_picker
    optional: true
- tapOn:
    description: "Select date"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    text: "15"
    optional: true
- tapOn:
    text: "20"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: appt_13_date_selected
- tapOn:
    id: time_slot
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: appt_13_time_selected
- tapOn:
    text: "Confirm Appointment"
    optional: true
- tapOn:
    id: confirm_btn
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_13_after_confirm
