# Test quick reason chips and rejection reason text field on reject appointment screen
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Vet Appointments"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "REQUESTED"
    optional: true
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Reject"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_14_reject_screen
- tapOn:
    id: reason_chip
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: appt_14_chip_selected
- tapOn:
    id: reason_chip
    index: 1
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    id: rejection_reason_field
    optional: true
- tapOn:
    text: "Reason"
    optional: true
- tapOn:
    text: "rejection"
    optional: true
- clearText:
    optional: true
- inputText: "Not available on the requested date"
- takeScreenshot: appt_14_reason_filled
- tapOn:
    text: "Reject"
    optional: true
- tapOn:
    id: reject_btn
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_14_after_reject
