# Test quick reason chips and rejection reason text field on reject appointment screen
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Vet Home"
    optional: true
- tapOn:
    text: "Vet Dashboard"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    text: "Appointments"
    optional: true
- waitForAnimationToEnd:
    timeout: 6000
# Tap Reject on first appointment card
- tapOn:
    text: "Reject"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_14_reject_screen
# Tap a quick reason chip (text matches the chip label)
- tapOn:
    text: "Not available"
    optional: true
- tapOn:
    text: "Schedule conflict"
    optional: true
- tapOn:
    text: "Outside service area"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: appt_14_chip_selected
# Type custom reason in text field (using hint text to find field)
- tapOn:
    text: "Enter a reason for rejecting this request..."
    optional: true
- clearText:
    optional: true
- inputText: "Not available on the requested date"
- takeScreenshot: appt_14_reason_filled
# Tap submit rejection button
- tapOn:
    id: "submit_rejection_btn"
    optional: true
- tapOn:
    text: "Reject"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_14_after_reject
