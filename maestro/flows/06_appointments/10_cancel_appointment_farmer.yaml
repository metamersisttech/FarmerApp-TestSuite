# Appointments 10: Farmer cancels a REQUESTED/CONFIRMED appointment from their side

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to My Appointments
- tapOn:
    text: "My Appointments"
    optional: true
- tapOn:
    text: "Appointments"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

- takeScreenshot: appt_10_my_appointments

# Tap first appointment card
- tapOn:
    id: "appointment_card"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: appt_10_appointment_detail

# Tap Cancel button (bottom action bar)
- tapOn:
    id: "appointment_detail_cancel_btn"
    optional: true
- tapOn:
    text: "Cancel"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: appt_10_cancel_dialog

# Confirm cancellation in dialog
- tapOn:
    text: "Yes"
    optional: true
- tapOn:
    text: "Confirm"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: appt_10_after_cancel

- pressKey: back
- waitForAnimationToEnd
