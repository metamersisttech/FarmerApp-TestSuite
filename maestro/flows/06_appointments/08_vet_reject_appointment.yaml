# Appointments 08 — Vet rejects a pending appointment

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

- tapOn:
    text: "Vet Home"
    optional: true
- tapOn:
    text: "Vet Dashboard"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

- tapOn:
    text: "Appointments"
    optional: true
- waitForAnimationToEnd:
    timeout: 6000

- takeScreenshot: appt_08_vet_appointments

# Tap Reject on first appointment card
- tapOn:
    text: "Reject"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: appt_08_reject_screen

# Enter rejection reason in text field
- tapOn:
    text: "Enter a reason for rejecting this request..."
    optional: true
- inputText: "Not available at the requested time"

- takeScreenshot: appt_08_rejection_reason

# Tap Submit Rejection button
- tapOn:
    id: "submit_rejection_btn"
    optional: true
- tapOn:
    text: "Reject"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

- takeScreenshot: appt_08_after_reject
