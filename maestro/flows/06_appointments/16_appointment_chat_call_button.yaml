# Test the Call IconButton inside appointment chat screen
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "My Appointments"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "CONFIRMED"
    optional: true
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Chat"
    optional: true
- tapOn:
    id: chat_btn
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_16_chat_screen
- tapOn:
    id: call_btn
    optional: true
- tapOn:
    description: "Call"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: appt_16_call_tapped
- pressKey:
    key: back
    optional: true
