# Test the Call IconButton inside appointment chat screen
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "My Appointments"
    optional: true
- tapOn:
    text: "Appointments"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    text: "Confirmed"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: "appointment_card"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
# Tap Chat from detail screen
- tapOn:
    id: "appointment_detail_chat_btn"
    optional: true
- tapOn:
    text: "Chat"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_16_chat_screen
# Tap call icon in chat app bar
- tapOn:
    id: "chat_call_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: appt_16_call_tapped
- pressKey: back
- waitForAnimationToEnd
