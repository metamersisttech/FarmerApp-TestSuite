# Test prescription field (required) and notes field on complete appointment screen
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Vet Home"
    optional: true
- tapOn:
    text: "Vet Dashboard"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    text: "Appointments"
    optional: true
- waitForAnimationToEnd:
    timeout: 6000
# Tap Complete on confirmed appointment
- tapOn:
    text: "Complete"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_15_complete_screen
# Fill prescription field (required)
- tapOn:
    text: "Medication, dosage, instructions..."
    optional: true
- inputText: "Administer antibiotic twice daily for 5 days"
# Fill additional notes field (optional)
- tapOn:
    text: "Follow-up visit, diet changes, etc..."
    optional: true
- inputText: "Patient is recovering well"
- takeScreenshot: appt_15_fields_filled
# Tap Mark as Complete button
- tapOn:
    id: "mark_complete_btn"
    optional: true
- tapOn:
    text: "Mark as Complete"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_15_after_complete
