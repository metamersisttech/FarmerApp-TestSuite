# Test prescription field (required) and notes field on complete appointment screen
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Vet Appointments"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "CONFIRMED"
    optional: true
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Complete"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_15_complete_screen
- tapOn:
    id: prescription_field
    optional: true
- tapOn:
    text: "Prescription"
    optional: true
- inputText: "Administer antibiotic twice daily for 5 days"
- tapOn:
    id: notes_field
    optional: true
- tapOn:
    text: "Notes"
    optional: true
- tapOn:
    text: "Additional notes"
    optional: true
- inputText: "Patient is recovering well"
- takeScreenshot: appt_15_fields_filled
- tapOn:
    text: "Mark as Complete"
    optional: true
- tapOn:
    id: complete_btn
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: appt_15_after_complete
