# Regression 01 — Full critical path regression
# Covers the most important user journeys end to end.
# Run this before every release.

appId: com.example.flutter_app
---
# ── 1. App launch ─────────────────────────────────────────────────────────
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 10000
- takeScreenshot: regression_01_launch

# ── 2. Language selection ──────────────────────────────────────────────────
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd

# ── 3. Login ───────────────────────────────────────────────────────────────
- tapOn:
    id: "phone_field"
    optional: true
- tapOn:
    text: "Phone Number"
    optional: true
- inputText: "${FARMERAPP_TEST_PHONE}"
- tapOn:
    text: "Send OTP"
- waitForAnimationToEnd:
    timeout: 8000
- inputText: "${FARMERAPP_TEST_OTP}"
- waitForAnimationToEnd:
    timeout: 12000
- takeScreenshot: regression_02_home

# ── 4. Bottom navigation ───────────────────────────────────────────────────
- tapOn:
    text: "Favourite"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: regression_03_favourites
- tapOn:
    text: "My Listings"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: regression_04_my_listings
- tapOn:
    text: "Profile"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: regression_05_profile

# ── 5. Back to home ────────────────────────────────────────────────────────
- tapOn:
    text: "Home"
    optional: true
- waitForAnimationToEnd

# ── 6. Search ──────────────────────────────────────────────────────────────
- tapOn:
    text: "Search"
    optional: true
- waitForAnimationToEnd
- inputText: "Cow"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: regression_06_search
- pressKey: back
- waitForAnimationToEnd

# ── 7. Transport booking form ──────────────────────────────────────────────
- tapOn:
    text: "Book Transport"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "pickup_field"
    optional: true
- inputText: "Village A"
- tapOn:
    id: "destination_field"
    optional: true
- inputText: "City B"
- takeScreenshot: regression_07_transport_form
- pressKey: back
- waitForAnimationToEnd

# ── 8. Final crash check ───────────────────────────────────────────────────
- assertNotVisible:
    text: "Unfortunately"
- assertNotVisible:
    text: "has stopped"
- takeScreenshot: regression_08_final
