# Listings 10 — Notifications screen loads

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Tap notification icon (visible in home header)
- tapOn:
    text: "Notifications"
    optional: true
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: listings_10_notifications
- assertNotVisible:
    text: "Unfortunately"
- pressKey: back
- waitForAnimationToEnd
