# Listings 23 — Post Animal: farm dropdown and auction/fixed price type

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Open Post Animal via the FAB (key: main_fab)
- tapOn:
    id: "main_fab"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_23_details_step

# Select Auction price type chip
- tapOn:
    text: "Auction"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: listings_23_auction_selected

# Switch back to Fixed
- tapOn:
    text: "Fixed"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: listings_23_fixed_selected

# Open farm dropdown
- tapOn:
    text: "Select Farm"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_23_farm_dropdown

- pressKey: back
- waitForAnimationToEnd
