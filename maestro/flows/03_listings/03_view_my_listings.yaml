# Listings 03 — My Listings page shows posted animals

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to My Listings tab (icon-only bottom nav)
- tapOn:
    id: "nav_my_listings"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: listings_03_my_listings
- assertNotVisible:
    text: "Unfortunately"
- scroll
- waitForAnimationToEnd
- takeScreenshot: listings_03_scrolled
