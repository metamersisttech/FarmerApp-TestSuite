# Listings 08 — My Bids page loads (accessible from Profile screen)

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to Profile tab
- tapOn:
    id: "nav_profile"
    optional: true
- waitForAnimationToEnd

# Tap My Bids (text link in profile screen)
- tapOn:
    text: "My Bids"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: listings_08_my_bids
- assertNotVisible:
    text: "Unfortunately"
