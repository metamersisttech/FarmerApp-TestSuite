# Listings 09 — Create Farm page renders and accepts input

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to My Listings tab
- tapOn:
    id: "nav_my_listings"
    optional: true
- waitForAnimationToEnd

# Tap Create Farm if visible (from empty state or profile)
- tapOn:
    text: "Create Farm"
    optional: true
- tapOn:
    text: "Add Farm"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_09_create_farm

- tapOn:
    text: "Farm Name"
    optional: true
- inputText: "Test Farm"

- tapOn:
    text: "Location"
    optional: true
- inputText: "Bihar, India"

- takeScreenshot: listings_09_form_filled
- pressKey: back
- waitForAnimationToEnd
