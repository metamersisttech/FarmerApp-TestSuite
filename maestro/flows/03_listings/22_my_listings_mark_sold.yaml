# Test Mark as Sold from My Listings popup menu.

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Profile"
    optional: true
- tapOn:
    id: "profile_tab"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "My Listings"
    optional: true
- tapOn:
    id: "my_listings_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_22_my_listings
- tapOn:
    description: "More options"
    index: 0
    optional: true
- tapOn:
    id: "popup_menu_btn"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: listings_22_popup_open
- tapOn:
    text: "Mark as Sold"
    optional: true
- tapOn:
    text: "Sold"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_22_mark_sold_dialog
- tapOn:
    text: "Confirm"
    optional: true
- tapOn:
    text: "Yes"
    optional: true
- tapOn:
    text: "Mark Sold"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_22_after_sold
