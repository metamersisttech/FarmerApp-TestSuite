# Listings 22 — Mark as Sold from My Listings popup menu.

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to My Listings tab
- tapOn:
    id: "nav_my_listings"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_22_my_listings

# Open popup menu on first listing
- tapOn:
    id: "listing_more_menu"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: listings_22_popup_open

# Tap "Mark as Sold"
- tapOn:
    text: "Mark as Sold"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_22_after_sold
