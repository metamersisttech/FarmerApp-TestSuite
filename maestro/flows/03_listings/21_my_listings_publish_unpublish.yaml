# Listings 21 — Publish and Unpublish from the My Listings popup menu.

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to My Listings tab
- tapOn:
    id: "nav_my_listings"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_21_my_listings

# Open popup menu on first listing (key: listing_more_menu)
- tapOn:
    id: "listing_more_menu"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: listings_21_popup_menu_open

# Tap Publish
- tapOn:
    text: "Publish"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_21_after_publish

# Open popup menu again to unpublish
- tapOn:
    id: "listing_more_menu"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# Tap Unpublish
- tapOn:
    text: "Unpublish"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_21_after_unpublish
