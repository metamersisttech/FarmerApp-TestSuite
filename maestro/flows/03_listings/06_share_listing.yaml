# Listings 06 — Share listing triggers share sheet

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Open first listing
- tapOn:
    id: "listing_card"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_06_detail_screen

# Tap share button (key: share_btn in ImageGallerySection)
- tapOn:
    id: "share_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: listings_06_share_sheet

# Dismiss share sheet
- pressKey: back
- waitForAnimationToEnd
