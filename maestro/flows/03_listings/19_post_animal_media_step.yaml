# Listings 19 — Post New Animal — Media Step

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Open Post Animal via the FAB (key: main_fab)
- tapOn:
    id: "main_fab"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Navigate to Media step — tap Next past Details, Health
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_19_media_step

# Try to add a photo
- tapOn:
    text: "Add Photo"
    optional: true
- tapOn:
    text: "Upload Photo"
    optional: true
- tapOn:
    text: "Upload"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_19_add_photo_tapped

# Dismiss any permission dialog or picker
- tapOn:
    text: "Cancel"
    optional: true
- tapOn:
    text: "Deny"
    optional: true
- pressKey: back
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_19_dismissed
