# Listings 15 — Edit Listing — Media Sub-step

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to My Listings tab
- tapOn:
    id: "nav_my_listings"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Open popup menu and tap Edit
- tapOn:
    id: "listing_more_menu"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Edit"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Navigate to Media step (tap Next twice to advance past Details, Health)
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_15_media_step

# Try to add a photo
- tapOn:
    text: "Add Photo"
    optional: true
- tapOn:
    text: "Upload Photo"
    optional: true
- tapOn:
    text: "Upload"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_15_upload_tapped

# Dismiss any permission dialog or photo picker
- tapOn:
    text: "Cancel"
    optional: true
- tapOn:
    text: "Deny"
    optional: true
- pressKey: back
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_15_after_cancel
