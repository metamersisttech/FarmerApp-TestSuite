# Listings 18 — Post New Animal — Health Step

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Open Post Animal via the FAB (key: main_fab)
- tapOn:
    id: "main_fab"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Navigate to Health step — tap Next past Details
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_18_health_step

# Set health status
- tapOn:
    text: "Health Status"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Healthy"
    optional: true
- waitForAnimationToEnd

# Add vaccination info
- tapOn:
    text: "Vaccination"
    optional: true
- inputText: "FMD, HS"
- waitForAnimationToEnd
- takeScreenshot: listings_18_health_filled

- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_18_health_next
