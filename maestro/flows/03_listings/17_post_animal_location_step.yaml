# Listings 17 — Post New Animal — Location Step

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Open Post Animal via the FAB (key: main_fab)
- tapOn:
    id: "main_fab"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Navigate to location step — tap Next past Details
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_17_location_step

# Type a city in the location search
- tapOn:
    text: "Search Location"
    optional: true
- tapOn:
    text: "Enter Location"
    optional: true
- inputText: "Mumbai"
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_17_city_typed

# Tap first location suggestion
- tapOn:
    text: "Mumbai"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_17_location_selected

- tapOn:
    text: "Cancel"
    optional: true
- pressKey: back
- waitForAnimationToEnd
