# Listings 05 — Add animal listing to favourites from detail screen

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
# Tap a listing from home
- tapOn:
    index: 0
    id: "listing_card"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_05_detail_before_fav
- tapOn:
    id: "favourite_btn"
    optional: true
- tapOn:
    text: "♡"
    optional: true
- tapOn:
    description: "Add to favourites"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: listings_05_after_fav
- pressKey: back
- waitForAnimationToEnd
# Verify in favourites tab
- tapOn:
    text: "Favourite"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_05_favourites_tab
