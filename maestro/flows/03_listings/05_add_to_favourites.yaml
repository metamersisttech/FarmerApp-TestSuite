# Listings 05 — Add animal listing to favourites from detail screen

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Tap a listing from home
- tapOn:
    id: "listing_card"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_05_detail_before_fav

# Tap favourite button (key: favourite_btn in ImageGallerySection)
- tapOn:
    id: "favourite_btn"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: listings_05_after_fav
- pressKey: back
- waitForAnimationToEnd

# Verify in favourites tab
- tapOn:
    id: "nav_favourite"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_05_favourites_tab
