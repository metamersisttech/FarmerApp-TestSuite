# Listings 16 — Edit Listing — Preview Step & Publish

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to My Listings tab
- tapOn:
    id: "nav_my_listings"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Open popup menu and tap Edit
- tapOn:
    id: "listing_more_menu"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Edit"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Navigate to Preview step (tap Next three times)
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_16_preview_step

# Publish or save draft
- tapOn:
    text: "Publish"
    optional: true
- tapOn:
    text: "Save Draft"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_16_publish_tapped
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_16_after_publish
