# Listings 12 — Delete a Draft Listing via popup menu

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to My Listings tab
- tapOn:
    id: "nav_my_listings"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_12_my_listings

# Open popup menu on first listing
- tapOn:
    id: "listing_more_menu"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Tap Delete from popup menu
- tapOn:
    text: "Delete"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_12_delete_confirm

# Confirm delete dialog (button text: "Delete")
- tapOn:
    text: "Delete"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_12_after_delete
