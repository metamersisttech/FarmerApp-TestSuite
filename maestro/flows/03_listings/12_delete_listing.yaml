# Listings 12 - Delete a Draft Listing

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "My Listings"
    optional: true
- tapOn:
    id: "my_listings_tab"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_12_my_listings
- tapOn:
    id: "listing_card"
    optional: true
- tapOn:
    text: "listing_card"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_12_detail_before_delete
- tapOn:
    text: "Delete"
    optional: true
- tapOn:
    text: "Remove"
    optional: true
- tapOn:
    id: "delete_listing_btn"
    optional: true
- longPressOn:
    id: "listing_card"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Delete"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_12_delete_confirm
- tapOn:
    text: "Delete"
    optional: true
- tapOn:
    text: "Yes"
    optional: true
- tapOn:
    text: "Confirm"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_12_after_delete
