# Listings 01 — Post Animal: Step 1 Details page renders

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to My Listings via bottom nav (icon-only)
- tapOn:
    id: "nav_my_listings"
    optional: true
- waitForAnimationToEnd

# Tap the FAB to open Post Animal page
- tapOn:
    id: "main_fab"
    optional: true

- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: listings_01_details_page
- assertNotVisible:
    text: "Unfortunately"
