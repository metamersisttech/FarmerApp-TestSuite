# Listings 11 — Seller Approves and Rejects Bids

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to My Listings tab
- tapOn:
    id: "nav_my_listings"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Open first listing
- tapOn:
    id: "listing_card"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Tap View Bids (owner view)
- tapOn:
    id: "view_bids_btn"
    optional: true
- tapOn:
    text: "View Bids"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_11_bids_list

# Approve first bid
- tapOn:
    id: "approve_bid_btn"
    index: 0
    optional: true
- tapOn:
    text: "Approve"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_11_approve_dialog

# Confirm approve dialog (button text: "Approve Bid")
- tapOn:
    text: "Approve Bid"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_11_after_approve

- pressKey: back
- waitForAnimationToEnd

# Reject second bid
- tapOn:
    id: "reject_bid_btn"
    index: 0
    optional: true
- tapOn:
    text: "Reject"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_11_reject_dialog

# Confirm reject dialog (button text: "Reject")
- tapOn:
    text: "Reject"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_11_after_reject
