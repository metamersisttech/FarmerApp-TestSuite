# Listings 11 - Seller Approves and Rejects Bids

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "My Listings"
    optional: true
- tapOn:
    id: "my_listings_tab"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    id: "listing_card"
    optional: true
- tapOn:
    text: "listing_card"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: "Bids"
    optional: true
- tapOn:
    text: "View Bids"
    optional: true
- tapOn:
    id: "view_bids_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_11_bids_list
- tapOn:
    index: 0
    id: "bid_item"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Approve"
    optional: true
- tapOn:
    id: "approve_bid_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_11_approve_dialog
- tapOn:
    text: "Confirm"
    optional: true
- tapOn:
    text: "Yes"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_11_after_approve
- pressKey: BACK
- waitForAnimationToEnd
- tapOn:
    index: 1
    id: "bid_item"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Reject"
    optional: true
- tapOn:
    id: "reject_bid_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_11_reject_dialog
- tapOn:
    text: "Confirm"
    optional: true
- tapOn:
    text: "Yes"
    optional: true
- tapOn:
    text: "OK"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_11_after_reject
