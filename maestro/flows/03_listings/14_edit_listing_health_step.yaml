# Listings 14 — Edit Listing — Health Sub-step

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to My Listings tab
- tapOn:
    id: "nav_my_listings"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Open popup menu and tap Edit
- tapOn:
    id: "listing_more_menu"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Edit"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Navigate to Health step (tap Next to advance past Details)
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_14_health_step

# Set health status
- tapOn:
    text: "Health Status"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Healthy"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_14_health_selected

# Set vaccination status
- tapOn:
    text: "Vaccination Status"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Vaccinated"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Next"
    optional: true
- tapOn:
    text: "Save"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_14_health_saved
