# Listings 20 — Post New Animal — Preview / Final Step

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Open Post Animal via the FAB (key: main_fab)
- tapOn:
    id: "main_fab"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Navigate to Preview step — tap Next through Details, Health, Media
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Next"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: listings_20_preview_step

# Save as draft
- tapOn:
    text: "Save as Draft"
    optional: true
- tapOn:
    text: "Save Draft"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_20_draft_saved
