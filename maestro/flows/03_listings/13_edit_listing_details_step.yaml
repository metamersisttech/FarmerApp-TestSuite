# Listings 13 — Edit Listing — Details Sub-step

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to My Listings tab
- tapOn:
    id: "nav_my_listings"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Open popup menu on first listing and tap Edit
- tapOn:
    id: "listing_more_menu"
    index: 0
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Edit"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_13_edit_entry

# Now on the edit Details step
- takeScreenshot: listings_13_details_step

- tapOn:
    text: "Title"
    optional: true
- clearText
- inputText: "Updated Animal Title"

- tapOn:
    text: "Price"
    optional: true
- clearText
- inputText: "15000"

- waitForAnimationToEnd
- takeScreenshot: listings_13_details_filled

- tapOn:
    text: "Next"
    optional: true
- tapOn:
    text: "Save"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_13_details_saved
