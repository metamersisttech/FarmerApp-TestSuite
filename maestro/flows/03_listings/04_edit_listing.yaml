# Listings 04 — Edit an existing listing via popup menu

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to My Listings tab
- tapOn:
    id: "nav_my_listings"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: listings_04_my_listings

# Tap the "more" popup menu on the first listing
- tapOn:
    id: "listing_more_menu"
    index: 0
    optional: true
- waitForAnimationToEnd

# Tap Edit from popup menu
- tapOn:
    text: "Edit"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: listings_04_edit_screen
- pressKey: back
- waitForAnimationToEnd
