# Auth 06 — Forgot Password flow reaches reset screen

appId: com.example.flutter_app
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 10000
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd
# Navigate to email login first, then forgot password
- tapOn:
    text: "Email"
    optional: true
- tapOn:
    text: "Login with Email"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: auth_06_email_login_screen
- tapOn:
    text: "Forgot Password"
    optional: true
- tapOn:
    text: "Forgot password?"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: auth_06_forgot_password_screen
# Enter email
- tapOn:
    text: "Email"
    optional: true
- inputText: "${FARMERAPP_TEST_EMAIL}"
- tapOn:
    text: "Send"
    optional: true
- tapOn:
    text: "Reset Password"
    optional: true
- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: auth_06_after_reset_request
