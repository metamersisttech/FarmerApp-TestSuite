# Auth 06 — Forgot Password flow reaches reset screen

appId: com.example.flutter_app
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 10000
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd

# Navigate to email login first
- tapOn:
    id: "email_login_link"
    optional: true
- tapOn:
    text: "OR login via email"
    optional: true

- waitForAnimationToEnd
- takeScreenshot: auth_06_email_login_screen

# Tap Forgot Password? link
- tapOn:
    id: "forgot_password_link"
    optional: true
- tapOn:
    text: "Forgot Password?"
    optional: true

- waitForAnimationToEnd
- takeScreenshot: auth_06_forgot_password_screen

# Enter email address
- tapOn:
    text: "Email Address"
    optional: true
- inputText: "${FARMERAPP_TEST_EMAIL}"

- tapOn:
    id: "send_reset_email_btn"
    optional: true
- tapOn:
    text: "Send Reset Email"
    optional: true

- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: auth_06_after_reset_request
