# Test navigation links on auth screens:
# send OTP → email login link, email login → register link, email login → forgot password.

appId: com.example.flutter_app
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 10000
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: auth_10_send_otp_screen

# Tap "OR login via email" link
- tapOn:
    id: "email_login_link"
    optional: true
- tapOn:
    text: "OR login via email"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: auth_10_email_login_screen

# From email login, tap Register link
- tapOn:
    id: "register_link"
    optional: true
- tapOn:
    text: "Register"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: auth_10_register_screen
- pressKey: back
- waitForAnimationToEnd

# From email login, tap Forgot Password? link
- tapOn:
    id: "forgot_password_link"
    optional: true
- tapOn:
    text: "Forgot Password?"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: auth_10_forgot_password_screen
- pressKey: back
