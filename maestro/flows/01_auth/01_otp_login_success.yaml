# Auth 01 — OTP Login Happy Path
# Full login flow: phone entry → OTP → Home screen

appId: com.example.flutter_app
---
- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 10000

- tapOn:
    text: "English"
    optional: true

- waitForAnimationToEnd

# Enter phone number in the phone field
- tapOn:
    text: "Enter 10 digit number"
    optional: true

- inputText: "${FARMERAPP_TEST_PHONE}"

- tapOn:
    id: "get_otp_btn"
    optional: true
- tapOn:
    text: "Get OTP"
    optional: true

- waitForAnimationToEnd:
    timeout: 8000

- takeScreenshot: auth_01_otp_screen

- inputText: "${FARMERAPP_TEST_OTP}"

- waitForAnimationToEnd:
    timeout: 12000

- takeScreenshot: auth_01_after_login

# Should NOT still be on login screen
- assertNotVisible:
    text: "Get OTP"
