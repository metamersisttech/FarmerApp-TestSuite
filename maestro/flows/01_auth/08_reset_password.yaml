# Auth 08 - Forgot Password & Reset Password

appId: com.example.flutter_app
---
- launchApp:
    clearState: true
- waitForAnimationToEnd
- tapOn:
    text: "Forgot Password"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: auth_08_forgot_pw_form
- tapOn:
    id: "email_field"
    optional: true
- inputText: "testuser@example.com"
- tapOn:
    text: "Email"
    optional: true
- inputText: "testuser@example.com"
- waitForAnimationToEnd
- tapOn:
    text: "Send Reset Link"
    optional: true
- tapOn:
    text: "Send"
    optional: true
- tapOn:
    text: "Reset Password"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: auth_08_reset_link_sent
- tapOn:
    text: "New Password"
    optional: true
- tapOn:
    id: "new_password_field"
    optional: true
- inputText: "NewPassword@123"
- waitForAnimationToEnd
- tapOn:
    text: "Confirm Password"
    optional: true
- tapOn:
    id: "confirm_password_field"
    optional: true
- inputText: "NewPassword@123"
- waitForAnimationToEnd
- takeScreenshot: auth_08_reset_password_form
- tapOn:
    text: "Reset"
    optional: true
- tapOn:
    text: "Submit"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: auth_08_reset_success
