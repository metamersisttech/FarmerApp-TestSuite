# Auth 08 — Reset Password using token

appId: com.example.flutter_app
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 10000
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd

# Navigate to email login then forgot password
- tapOn:
    id: "email_login_link"
    optional: true
- tapOn:
    text: "OR login via email"
    optional: true
- waitForAnimationToEnd

- tapOn:
    id: "forgot_password_link"
    optional: true
- tapOn:
    text: "Forgot Password?"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: auth_08_forgot_pw_form

# Enter email and send reset request
- tapOn:
    text: "Email Address"
    optional: true
- inputText: "${FARMERAPP_TEST_EMAIL}"

- tapOn:
    id: "send_reset_email_btn"
    optional: true
- tapOn:
    text: "Send Reset Email"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: auth_08_reset_link_sent

# In mock mode, tap "Reset Now" in the success dialog to go to reset page
- tapOn:
    text: "Reset Now"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: auth_08_reset_password_form

# Fill the reset password form
- tapOn:
    text: "Reset Token"
    optional: true
- inputText: "test-reset-token"

- tapOn:
    text: "New Password"
    optional: true
- inputText: "NewPassword@123"

- tapOn:
    text: "Confirm New Password"
    optional: true
- inputText: "NewPassword@123"

- tapOn:
    id: "reset_password_btn"
    optional: true
- tapOn:
    text: "Reset Password"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: auth_08_reset_success

# Tap Go to Login in success dialog
- tapOn:
    text: "Go to Login"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
