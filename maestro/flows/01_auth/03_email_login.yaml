# Auth 03 — Email Login Flow

appId: com.example.flutter_app
---
- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 10000

- tapOn:
    text: "English"
    optional: true

- waitForAnimationToEnd

# Navigate to email login via the link on the OTP screen
- tapOn:
    id: "email_login_link"
    optional: true
- tapOn:
    text: "OR login via email"
    optional: true

- waitForAnimationToEnd

- takeScreenshot: auth_03_email_login_screen

# Enter email/username
- tapOn:
    text: "Email or Username"
    optional: true
- inputText: "${FARMERAPP_TEST_EMAIL}"

# Enter password
- tapOn:
    text: "Password"
    optional: true
- inputText: "${FARMERAPP_TEST_PASSWORD}"

- tapOn:
    id: "login_btn"
    optional: true
- tapOn:
    text: "Login"
    optional: true

- waitForAnimationToEnd:
    timeout: 12000

- takeScreenshot: auth_03_after_email_login
