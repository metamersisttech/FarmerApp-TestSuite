# Auth 05 — Invalid OTP keeps user on OTP screen

appId: com.example.flutter_app
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 10000
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd

# Enter phone and request OTP
- tapOn:
    text: "Enter 10 digit number"
    optional: true
- inputText: "${FARMERAPP_TEST_PHONE}"

- tapOn:
    id: "get_otp_btn"
    optional: true
- tapOn:
    text: "Get OTP"
    optional: true

- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: auth_05_otp_entry_screen

# Enter wrong OTP (6 digits but incorrect)
- inputText: "000000"

- waitForAnimationToEnd:
    timeout: 6000
- takeScreenshot: auth_05_after_wrong_otp

# Must still show OTP verification UI — not navigated to home
- assertVisible:
    text: "Verify OTP"
    optional: true
