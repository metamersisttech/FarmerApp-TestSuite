# Full reset password flow:
# enter token + new password + confirm password + submit → Go to Login.

appId: com.example.flutter_app
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 10000
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd

# Navigate to email login then forgot password
- tapOn:
    id: "email_login_link"
    optional: true
- tapOn:
    text: "OR login via email"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- tapOn:
    id: "forgot_password_link"
    optional: true
- tapOn:
    text: "Forgot Password?"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Enter email and request reset
- tapOn:
    text: "Email Address"
    optional: true
- inputText: "${FARMERAPP_TEST_EMAIL}"

- tapOn:
    id: "send_reset_email_btn"
    optional: true
- tapOn:
    text: "Send Reset Email"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: auth_11_reset_email_sent

# In mock mode the success dialog shows "Reset Now" to navigate to reset page
- tapOn:
    text: "Reset Now"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: auth_11_reset_password_page

# Fill token field
- tapOn:
    text: "Reset Token"
    optional: true
- inputText: "test-reset-token"

# Fill new password
- tapOn:
    text: "New Password"
    optional: true
- inputText: "NewPass@1234"

# Fill confirm password
- tapOn:
    text: "Confirm New Password"
    optional: true
- inputText: "NewPass@1234"

- takeScreenshot: auth_11_form_filled

- tapOn:
    id: "reset_password_btn"
    optional: true
- tapOn:
    text: "Reset Password"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: auth_11_after_submit

# Tap "Go to Login" in the success dialog
- tapOn:
    text: "Go to Login"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: auth_11_back_at_login
