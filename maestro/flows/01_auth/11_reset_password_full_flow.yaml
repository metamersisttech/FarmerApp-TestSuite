# Full reset password flow:
# enter token + new password + confirm password + submit → Go to Login.

appId: com.example.flutter_app
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 10000
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "login via email"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Forgot Password"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: "email_field"
    optional: true
- tapOn:
    text: "Email"
    optional: true
- waitForAnimationToEnd
- inputText: "testuser@testfarm.com"
- tapOn:
    text: "Send Reset Email"
    optional: true
- tapOn:
    text: "Send Reset Link"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: auth_11_reset_email_sent
- tapOn:
    text: "Reset Now"
    optional: true
- tapOn:
    text: "Go to Reset"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: auth_11_reset_password_page
- tapOn:
    id: "token_field"
    optional: true
- tapOn:
    text: "Token"
    optional: true
- tapOn:
    text: "Reset Token"
    optional: true
- waitForAnimationToEnd
- inputText: "test-reset-token"
- tapOn:
    id: "new_password_field"
    optional: true
- tapOn:
    text: "New Password"
    optional: true
- waitForAnimationToEnd
- inputText: "NewPass@1234"
- tapOn:
    id: "confirm_password_field"
    optional: true
- tapOn:
    text: "Confirm"
    optional: true
- waitForAnimationToEnd
- inputText: "NewPass@1234"
- takeScreenshot: auth_11_form_filled
- tapOn:
    text: "Reset Password"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: auth_11_after_submit
- tapOn:
    text: "Go to Login"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: auth_11_back_at_login
