# Auth 02 — Invalid phone number shows validation error

appId: com.example.flutter_app
---
- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 10000

- tapOn:
    text: "English"
    optional: true

- waitForAnimationToEnd

# Enter a too-short phone number
- tapOn:
    text: "Enter 10 digit number"
    optional: true

- inputText: "123"

- tapOn:
    id: "get_otp_btn"
    optional: true
- tapOn:
    text: "Get OTP"
    optional: true

- waitForAnimationToEnd

- takeScreenshot: auth_02_invalid_phone

# Should stay on same screen / show error
- assertVisible:
    text: "Get OTP"
