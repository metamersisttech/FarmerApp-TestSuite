# Auth 02 — Invalid phone number shows validation error

appId: com.example.flutter_app
---
- launchApp:
    clearState: true

- waitForAnimationToEnd:
    timeout: 10000

- tapOn:
    text: "English"
    optional: true

- waitForAnimationToEnd

- tapOn:
    id: "phone_field"
    optional: true
- tapOn:
    text: "Phone Number"
    optional: true

# Enter a too-short phone number
- inputText: "123"

- tapOn:
    text: "Send OTP"

- waitForAnimationToEnd

- takeScreenshot: auth_02_invalid_phone

# Should stay on same screen / show error
- assertVisible:
    text: "Send OTP"
