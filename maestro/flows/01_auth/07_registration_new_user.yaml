# Auth 07 — Registration flow for new user
# Note: Uses a unique test number to avoid conflicts; adjust as needed.

appId: com.example.flutter_app
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 10000
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd

# Tap "Or Sign up instead" from the OTP login screen
- tapOn:
    id: "signup_link"
    optional: true
- tapOn:
    text: "Or Sign up instead"
    optional: true

- waitForAnimationToEnd
- takeScreenshot: auth_07_register_screen

# Fill registration form
- tapOn:
    text: "Username"
    optional: true
- inputText: "testfarmer"

- tapOn:
    text: "First Name"
    optional: true
- inputText: "Test"

- tapOn:
    text: "Last Name"
    optional: true
- inputText: "Farmer"

- tapOn:
    text: "Email Address"
    optional: true
- inputText: "${FARMERAPP_TEST_EMAIL}"

- tapOn:
    text: "Enter 10 digit number"
    optional: true
- inputText: "${FARMERAPP_TEST_PHONE}"

- tapOn:
    text: "Password"
    optional: true
- inputText: "${FARMERAPP_TEST_PASSWORD}"

- tapOn:
    text: "Confirm Password"
    optional: true
- inputText: "${FARMERAPP_TEST_PASSWORD}"

- takeScreenshot: auth_07_form_filled

- tapOn:
    id: "register_btn"
    optional: true
- tapOn:
    text: "Register"
    optional: true

- waitForAnimationToEnd:
    timeout: 10000
- takeScreenshot: auth_07_after_register
