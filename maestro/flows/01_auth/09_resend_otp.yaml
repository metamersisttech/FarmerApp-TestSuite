# Test the Resend OTP button on the OTP verification screen.

appId: com.example.flutter_app
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 10000
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd

# Enter phone and get OTP
- tapOn:
    text: "Enter 10 digit number"
    optional: true
- inputText: "${FARMERAPP_TEST_PHONE}"

- tapOn:
    id: "get_otp_btn"
    optional: true
- tapOn:
    text: "Get OTP"
    optional: true

- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: auth_09_otp_screen

# Wait for resend timer to expire (30 seconds)
- waitForAnimationToEnd:
    timeout: 32000

# Tap Resend OTP — button only becomes active after 30s timer
- tapOn:
    id: "resend_otp_btn"
    optional: true
- tapOn:
    text: "Resend OTP"
    optional: true

- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: auth_09_resend_tapped

# Verify still on OTP screen
- assertVisible:
    text: "Verify OTP"
    optional: true
