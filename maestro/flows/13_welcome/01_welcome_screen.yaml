# Welcome Screen — cold start shows splash, language selector, then Get Started button
#
# Key facts from source:
#   WelcomePage: title "Welcome to Animal World", ElevatedButton "Get Started" (key: get_started_btn)
#   After language screen the app navigates to WelcomePage, then SendOtpPage

appId: com.example.flutter_app
---
- launchApp:
    clearState: true
- waitForAnimationToEnd:
    timeout: 10000
- takeScreenshot: welcome_01_splash

# Language screen — select English
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: welcome_01_language_selected

# Welcome page should now be visible
- assertVisible:
    text: "Welcome to Animal World"
    optional: true

# Tap Get Started button (key added to source)
- tapOn:
    id: "get_started_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: welcome_01_get_started_tapped

# Should now be on Send OTP / login screen
- assertVisible:
    text: "Send OTP"
    optional: true
