# Test the center FAB in main shell navigates directly to PostAnimalPage
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: edge_06_home_with_fab
- tapOn:
    id: main_fab
    optional: true
- tapOn:
    description: "Post animal"
    optional: true
- tapOn:
    description: "Add listing"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: edge_06_post_animal_opened
- pressKey:
    key: back
    optional: true
- waitForAnimationToEnd
- takeScreenshot: edge_06_back_to_home
