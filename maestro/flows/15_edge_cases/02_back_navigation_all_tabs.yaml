# Back Navigation — back button is safe from every bottom nav tab
#
# Key facts from source:
#   CustomBottomNavBar: icon-only. Keys: nav_home(0), nav_favourite(1), nav_my_listings(2), nav_profile(3)
#   No text labels in bottom nav bar

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Home tab (key: nav_home)
- tapOn:
    id: "nav_home"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: edge_02_nav_home
- pressKey: back
- waitForAnimationToEnd

# Favourites tab (key: nav_favourite)
- tapOn:
    id: "nav_favourite"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: edge_02_nav_favourites
- pressKey: back
- waitForAnimationToEnd

# My Listings / My Ads tab (key: nav_my_listings)
- tapOn:
    id: "nav_my_listings"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: edge_02_nav_myads
- pressKey: back
- waitForAnimationToEnd

# Profile tab (key: nav_profile)
- tapOn:
    id: "nav_profile"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: edge_02_nav_profile
- pressKey: back
- waitForAnimationToEnd
