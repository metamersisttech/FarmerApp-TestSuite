# Empty States — all major empty state screens render without crash
#
# Key facts from source:
#   CustomBottomNavBar: icon-only keys: nav_home, nav_favourite, nav_my_listings, nav_profile
#   Profile menu items exact titles: "My Listings", "My Bids", "Messages"
#   ConversationsPage empty state: "No conversations yet" (line 99)
#   Start the conversation hint: "Start chatting from a listing!" (line 108)

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to Profile tab
- tapOn:
    id: "nav_profile"
    optional: true
- waitForAnimationToEnd

# --- My Listings empty state ---
- tapOn:
    text: "My Listings"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: edge_01_empty_listings

# --- My Bids empty state ---
- pressKey: back
- waitForAnimationToEnd
- tapOn:
    id: "nav_profile"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "My Bids"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: edge_01_empty_bids

# --- Messages (Conversations) empty state ---
- pressKey: back
- waitForAnimationToEnd
- tapOn:
    id: "nav_profile"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Messages"
    optional: true
- waitForAnimationToEnd
# Exact empty state text from conversations_page.dart line 99
- assertVisible:
    text: "No conversations yet"
    optional: true
- takeScreenshot: edge_01_empty_conversations
