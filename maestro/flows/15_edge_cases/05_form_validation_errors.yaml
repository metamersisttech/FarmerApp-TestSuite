# Form Validation Errors — validation error messages appear on required forms
#
# Key facts from source:
#   MainShellPage FAB: key "main_fab", navigates to PostAnimalPage
#   CustomBottomNavBar: icon-only, keys: nav_home, nav_favourite, nav_my_listings, nav_profile

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Tap the center FAB to open PostAnimalPage (key: main_fab)
- tapOn:
    id: "main_fab"
    optional: true
- waitForAnimationToEnd

# Try to advance without filling in required fields
- tapOn:
    text: "Next"
    optional: true
- tapOn:
    text: "Submit"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: edge_05_post_validation_errors

- pressKey: back
- waitForAnimationToEnd

# Navigate to Profile → My Bookings for appointment form validation
- tapOn:
    id: "nav_profile"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "My Bookings"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Book Appointment"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Submit"
    optional: true
- tapOn:
    text: "Confirm"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: edge_05_appointment_validation_errors
