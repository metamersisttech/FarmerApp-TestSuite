# Language 04 — Cycle through all 4 languages, end on English
#
# Key facts from source:
#   CustomBottomNavBar: icon-only, Profile tab key: "nav_profile"
#   Language menu item title: "Language" (from profile_model.dart)

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

- tapOn:
    id: "nav_profile"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Language"
    optional: true
- waitForAnimationToEnd

# Hindi
- tapOn:
    text: "Hindi"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: language_04_hindi

# Marathi
- tapOn:
    text: "Marathi"
    optional: true
- tapOn:
    text: "मराठी"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: language_04_marathi

# Punjabi
- tapOn:
    text: "Punjabi"
    optional: true
- tapOn:
    text: "ਪੰਜਾਬੀ"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: language_04_punjabi

# Back to English
- tapOn:
    text: "English"
    optional: true
- tapOn:
    text: "ਅੰਗਰੇਜ਼ੀ"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: language_04_english_final

- assertNotVisible:
    text: "Unfortunately"
