# Language 03 — Switch to Punjabi
#
# Key facts from source:
#   CustomBottomNavBar: icon-only, Profile tab key: "nav_profile"
#   Language menu item title: "Language" (from profile_model.dart)

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

- tapOn:
    id: "nav_profile"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Language"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Punjabi"
    optional: true
- tapOn:
    text: "ਪੰਜਾਬੀ"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: language_03_punjabi_active

# Restore English
- tapOn:
    text: "English"
    optional: true
- tapOn:
    text: "ਅੰਗਰੇਜ਼ੀ"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: language_03_english_restored
