# Language 01 — Switch app language to Hindi
#
# Key facts from source:
#   CustomBottomNavBar: icon-only, Profile tab key: "nav_profile"
#   Language menu item title: "Language" (from profile_model.dart)
#   LanguageSwitcherWidget also in profile header (compact mode)

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml

- waitForAnimationToEnd

# Navigate to Profile tab (icon-only bottom nav)
- tapOn:
    id: "nav_profile"
    optional: true

- waitForAnimationToEnd

# Tap Language menu item (exact title from profile_model.dart)
- tapOn:
    text: "Language"
    optional: true

- waitForAnimationToEnd

- tapOn:
    text: "Hindi"
    optional: true
- tapOn:
    text: "हिंदी"
    optional: true

- waitForAnimationToEnd:
    timeout: 4000

- takeScreenshot: language_01_hindi_active

# Switch back to English so subsequent tests are not affected
- tapOn:
    text: "English"
    optional: true
- tapOn:
    text: "अंग्रेजी"
    optional: true

- waitForAnimationToEnd

- takeScreenshot: language_01_english_restored
