# Language 02 — Switch to Marathi
#
# Key facts from source:
#   CustomBottomNavBar: icon-only, Profile tab key: "nav_profile"
#   Language menu item title: "Language" (from profile_model.dart)

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

- tapOn:
    id: "nav_profile"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Language"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Marathi"
    optional: true
- tapOn:
    text: "मराठी"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: language_02_marathi_active

# Restore English
- tapOn:
    text: "English"
    optional: true
- tapOn:
    text: "इंग्रजी"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: language_02_english_restored
