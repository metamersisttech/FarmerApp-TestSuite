# Settings 01 — Settings screen loads all options

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

- tapOn:
    text: "Profile"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Settings"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: settings_01_screen

- assertNotVisible:
    text: "Unfortunately"

# Scroll to see all settings options
- scroll
- waitForAnimationToEnd
- takeScreenshot: settings_01_scrolled

- pressKey: back
- waitForAnimationToEnd
