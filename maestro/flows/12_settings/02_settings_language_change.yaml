appId: com.example.flutter_app
---
# 12/02 — Change language from Settings → App Preferences → Language
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

- tapOn:
    id: "nav_profile"
- waitForAnimationToEnd

- tapOn:
    id: "settings_btn"
- waitForAnimationToEnd

- takeScreenshot: settings_02_before_language

# Scroll to App Preferences section
- scroll
- tapOn:
    id: "settings_language"
- waitForAnimationToEnd:
    timeout: 4000

- takeScreenshot: settings_02_language_screen

# Select Hindi
- tapOn:
    text: "Hindi"
    optional: true
- tapOn:
    text: "हिंदी"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: settings_02_hindi_applied

# Restore English
- tapOn:
    text: "English"
    optional: true
- tapOn:
    text: "अंग्रेजी"
    optional: true
- waitForAnimationToEnd

- pressKey: back
- waitForAnimationToEnd
