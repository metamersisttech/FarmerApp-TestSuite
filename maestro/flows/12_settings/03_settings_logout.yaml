# Settings 03 — Logout via Settings screen

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

- tapOn:
    text: "Profile"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Settings"
    optional: true
- waitForAnimationToEnd

- scroll
- waitForAnimationToEnd

- takeScreenshot: settings_03_before_logout

- tapOn:
    text: "Logout"
    optional: true
- tapOn:
    text: "Log Out"
    optional: true
- tapOn:
    text: "Sign Out"
    optional: true

# Confirm dialog
- tapOn:
    text: "Yes"
    optional: true
- tapOn:
    text: "Confirm"
    optional: true
- tapOn:
    text: "OK"
    optional: true

- waitForAnimationToEnd:
    timeout: 8000

- takeScreenshot: settings_03_after_logout

# Must return to login / language screen
- assertVisible:
    text: "English"
    optional: true
- assertVisible:
    text: "Send OTP"
    optional: true
