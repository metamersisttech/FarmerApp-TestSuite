appId: com.example.flutter_app
---
# 12/03 — Settings: logout all devices dialog (cancel, not confirm — keeps session)
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

- tapOn:
    id: "nav_profile"
- waitForAnimationToEnd

- tapOn:
    id: "settings_btn"
- waitForAnimationToEnd

# Tap "Sign Out Everywhere" tile
- tapOn:
    id: "settings_logout_all_devices"
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: settings_03_logout_all_dialog

# Verify dialog appeared
- assertVisible:
    text: "Sign Out Everywhere"

# Cancel — keep session active
- tapOn:
    id: "logout_all_cancel_btn"
- waitForAnimationToEnd

# Still on settings
- assertVisible:
    text: "Settings"

- tapOn:
    id: "settings_back_btn"
- waitForAnimationToEnd
