# Favourites Empty State — page shows empty state when no saved listings
#
# Key facts from source:
#   FavouriteListingsPage empty state text: "No Favourite Listings Yet" (line 151)
#   Sub-text: "Start saving your favourite listings" (line 160)
#   CustomBottomNavBar: Favourite tab key: "nav_favourite" (icon-only)

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to Favourites tab (icon-only bottom nav, key: nav_favourite)
- tapOn:
    id: "nav_favourite"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: favourites_03_empty_state

# Assert exact empty state texts from source
- assertVisible:
    text: "No Favourite Listings Yet"
    optional: true
- assertVisible:
    text: "Start saving your favourite listings"
    optional: true
