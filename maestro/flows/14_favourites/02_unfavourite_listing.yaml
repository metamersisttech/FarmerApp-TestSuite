# Unfavourite — user removes a listing from favourites
#
# Key facts from source:
#   FavouriteListingsPage: ListingCard with onFavoriteTap removes from favourites
#   Empty state text: "No Favourite Listings Yet"
#   CustomBottomNavBar: Favourite tab key: "nav_favourite" (icon-only)

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to Favourites tab (icon-only bottom nav, key: nav_favourite)
- tapOn:
    id: "nav_favourite"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: favourites_02_before_unfavourite

# Tap the favourite/heart icon button on the first listing card to remove it
# ListingCard renders a heart-shaped IconButton for favouriting
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd

- takeScreenshot: favourites_02_after_unfavourite

# Check for empty state if all removed
- assertVisible:
    text: "No Favourite Listings Yet"
    optional: true
