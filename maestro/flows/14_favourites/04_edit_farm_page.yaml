# Edit Farm Page — user edits an existing farm's details
#
# Key facts from source:
#   "My Farms" is NOT a profile menu item (profile_model.dart only has My Listings, Saved Items, etc.)
#   Farms may be accessible via My Listings page or separate navigation
#   CustomBottomNavBar: icon-only. Profile tab key: "nav_profile"
#   My Listings menu item title: "My Listings"

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to Profile tab (icon-only bottom nav)
- tapOn:
    id: "nav_profile"
    optional: true
- waitForAnimationToEnd

# My Listings menu item (exact title from profile_model.dart)
- tapOn:
    text: "My Listings"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: favourites_04_farm_list

# Tap first listing item if available
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd

# Look for Edit action
- tapOn:
    text: "Edit"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: favourites_04_edit_farm

# Update a text field if visible
- tapOn:
    text: "Farm Name"
    optional: true
- clearText
- inputText: "Updated Test Farm"
- takeScreenshot: favourites_04_farm_name_updated

- tapOn:
    text: "Save"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: favourites_04_farm_saved
