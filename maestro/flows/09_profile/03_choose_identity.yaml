# Profile 03 — Choose identity screen (Farmer / Vet / Transport)

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Profile"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Choose Identity"
    optional: true
- tapOn:
    text: "Switch Role"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: profile_03_choose_identity
- assertVisible:
    text: "Farmer"
    optional: true
- pressKey: back
- waitForAnimationToEnd
