# Test notification screen: pagination scroll loads more, tap a notification
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    id: "notification_btn"
    optional: true
- tapOn:
    description: "Notifications"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: profile_13_notifications_loaded
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: profile_13_after_scroll
- swipe:
    direction: UP
    duration: 500
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: profile_13_paginated
- tapOn:
    index: 0
    id: "notification_card"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: profile_13_notification_tapped
- pressKey: back
