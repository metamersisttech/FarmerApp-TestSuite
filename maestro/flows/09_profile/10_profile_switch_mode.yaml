# Test Switch Mode card (switch between farmer/vet/transport mode)
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Profile"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: profile_10_profile_page
- tapOn:
    id: "switch_mode_card"
    optional: true
- tapOn:
    text: "Switch to"
    optional: true
- tapOn:
    text: "Switch Mode"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: profile_10_after_switch
- pressKey: back
- waitForAnimationToEnd
