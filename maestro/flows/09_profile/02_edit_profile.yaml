# Profile 02 — Edit profile: change name and save
#
# Key facts from source:
#   CustomBottomNavBar: icon-only. Profile tab key: "nav_profile"
#   ProfileHeaderCard ElevatedButton: text "Edit Profile", key "edit_profile_btn"
#   EditProfilePage AppBar title: "Edit Profile"
#   Save TextButton: text "Save", key "save_profile_btn"
#   Full name field hint: "Enter your full name"

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to Profile tab (icon-only bottom nav)
- tapOn:
    id: "nav_profile"
    optional: true
- waitForAnimationToEnd

# Tap Edit Profile button (key added to source)
- tapOn:
    id: "edit_profile_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: profile_02_edit_screen

# Tap full name field and update it
- tapOn:
    text: "Enter your full name"
    optional: true
- clearText
- inputText: "Test Farmer Updated"
- takeScreenshot: profile_02_name_updated

# Tap Save button (key: save_profile_btn)
- tapOn:
    id: "save_profile_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: profile_02_after_save
