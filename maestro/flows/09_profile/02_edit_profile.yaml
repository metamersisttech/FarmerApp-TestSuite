# Profile 02 — Edit profile: change name and save

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Profile"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Edit Profile"
    optional: true
- tapOn:
    id: "edit_profile_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: profile_02_edit_screen
- tapOn:
    text: "Name"
    optional: true
- clearText
- inputText: "Test Farmer Updated"
- takeScreenshot: profile_02_name_updated
- tapOn:
    text: "Save"
    optional: true
- tapOn:
    text: "Update"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: profile_02_after_save
