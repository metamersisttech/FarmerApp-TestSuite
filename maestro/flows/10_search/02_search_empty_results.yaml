# Search 02 — Search with no results shows empty state
#
# Key facts from source:
#   SearchResultsPage empty state: text "No results found" (line 224)
#   Sub-text: "Try adjusting your search query" (line 233)
#   CustomBottomNavBar: Home tab key: "nav_home"

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

- tapOn:
    id: "nav_home"
    optional: true
- waitForAnimationToEnd

- tapOn:
    text: "Search livestock, breeds..."
    optional: true
- waitForAnimationToEnd

- inputText: "xyzxyzxyznonexistent99999"
- pressKey: enter
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: search_02_empty_results

# Exact empty state text from source
- assertVisible:
    text: "No results found"
    optional: true
- assertNotVisible:
    text: "Unfortunately"

- pressKey: back
- waitForAnimationToEnd
