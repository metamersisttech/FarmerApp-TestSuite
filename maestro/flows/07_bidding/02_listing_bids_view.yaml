# Bidding 02 — View all bids on a specific listing (seller perspective)

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to My Listings tab
- tapOn:
    id: "nav_my_listings"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

# Open first listing
- tapOn:
    id: "listing_card"
    index: 0
    optional: true
- waitForAnimationToEnd

- takeScreenshot: bidding_02_listing_detail

# Open bids panel (View Bids shown for owner; key: view_bids_btn)
- tapOn:
    id: "view_bids_btn"
    optional: true
- tapOn:
    text: "View Bids"
    optional: true
- waitForAnimationToEnd:
    timeout: 6000

- takeScreenshot: bidding_02_listing_bids

- assertNotVisible:
    text: "Unfortunately"

- pressKey: back
- waitForAnimationToEnd
