# Bidding 03 — Place a bid on an animal listing (buyer perspective)

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Open an animal listing from home
- tapOn:
    id: "listing_card"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: bidding_03_listing_detail

# Tap Buy Now to trigger the bid sheet (or Place Bid if available)
- tapOn:
    id: "buy_now_btn"
    optional: true
- tapOn:
    text: "Buy Now"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000

- takeScreenshot: bidding_03_bid_dialog

# Submit bid using "Book a Bid Now" button
- tapOn:
    id: "submit_bid_btn"
    optional: true
- tapOn:
    text: "Book a Bid Now"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

- takeScreenshot: bidding_03_after_bid

- pressKey: back
- waitForAnimationToEnd
