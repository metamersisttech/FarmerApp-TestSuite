# Bidding 03 — Place a bid on an animal listing (buyer perspective)

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Open an animal listing from home
- tapOn:
    index: 0
    id: "listing_card"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: bidding_03_listing_detail

# Tap Place Bid
- tapOn:
    text: "Place Bid"
    optional: true
- tapOn:
    text: "Bid"
    optional: true
- tapOn:
    id: "place_bid_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000

- takeScreenshot: bidding_03_bid_dialog

# Enter bid amount
- tapOn:
    text: "Amount"
    optional: true
- tapOn:
    id: "bid_amount_field"
    optional: true
- inputText: "50000"

- takeScreenshot: bidding_03_amount_entered

# Confirm bid
- tapOn:
    text: "Confirm"
    optional: true
- tapOn:
    text: "Submit Bid"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

- takeScreenshot: bidding_03_after_bid

- pressKey: back
- waitForAnimationToEnd
