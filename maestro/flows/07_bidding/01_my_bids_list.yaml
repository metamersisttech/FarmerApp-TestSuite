# Bidding 01 — My Bids page loads and shows bid list

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to Profile tab
- tapOn:
    id: "nav_profile"
    optional: true
- waitForAnimationToEnd

# Tap My Bids (text link in profile screen)
- tapOn:
    text: "My Bids"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: bidding_01_my_bids_list

- assertNotVisible:
    text: "Unfortunately"

# Scroll to check list renders
- scroll
- waitForAnimationToEnd
- takeScreenshot: bidding_01_scrolled

- pressKey: back
- waitForAnimationToEnd
