# Transport 17: Pending approval screen shown to transporter awaiting admin review

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to application status (shown automatically or via transport section)
- tapOn:
    text: "Application Status"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: transport_17_pending_approval

# Assert pending approval screen elements visible
- assertVisible:
    text: "Pending Review"
    optional: true
- assertVisible:
    text: "Application Details"
    optional: true

# Tap Refresh button in appBar
- tapOn:
    description: "Refresh"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: transport_17_refresh_tapped

- pressKey: back
- waitForAnimationToEnd
