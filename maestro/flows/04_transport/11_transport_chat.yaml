# Transport 11 — Transport chat screen

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "My Bookings"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
# Tap first accepted/in-progress booking
- tapOn:
    text: "Accepted"
    index: 0
    optional: true
- tapOn:
    text: "In Transit"
    index: 0
    optional: true
- waitForAnimationToEnd
# Tap the chat icon in appBar
- tapOn:
    id: "detail_chat_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: transport_11_transport_chat
- pressKey: back
- waitForAnimationToEnd
