# Test date picker and time picker in book transport form
appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Book Transport"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: transport_18_book_form
- tapOn:
    id: "date_field"
    optional: true
- tapOn:
    description: "Select date"
    optional: true
- tapOn:
    text: "Date"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: transport_18_date_picker_opened
- tapOn:
    text: "15"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    text: "Confirm"
    optional: true
- tapOn:
    text: "Done"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: transport_18_date_selected
- tapOn:
    id: "time_field"
    optional: true
- tapOn:
    description: "Select time"
    optional: true
- tapOn:
    text: "Time"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: transport_18_time_picker_opened
- tapOn:
    text: "OK"
    optional: true
- tapOn:
    text: "Confirm"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: transport_18_time_selected
