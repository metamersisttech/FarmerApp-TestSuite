# Transport 18 — Test date picker and time picker in book transport form

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Book Transport"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: transport_18_book_form

# Tap date tile to open date picker
- tapOn:
    id: "pickup_date_tile"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: transport_18_date_picker_opened
- tapOn:
    text: "15"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    text: "OK"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: transport_18_date_selected

# Tap time tile to open time picker
- tapOn:
    id: "pickup_time_tile"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: transport_18_time_picker_opened
- tapOn:
    text: "OK"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: transport_18_time_selected
