# Transport 14: Transporter accepts a pending transport request

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to Nearby Requests
- tapOn:
    text: "Nearby Requests"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

- takeScreenshot: transport_14_pending_request

# Tap first request to open detail
- tapOn:
    index: 0
    text: "Pickup Location"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Tap Accept Request in bottom bar of RequestDetailScreen
- tapOn:
    id: "proceed_to_accept_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: transport_14_accept_screen

# Tap the bottom Accept Request button on AcceptRequestScreen
- tapOn:
    id: "accept_request_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: transport_14_accept_dialog

# Confirm in dialog
- tapOn:
    text: "Accept Request"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: transport_14_after_accept

- pressKey: back
- waitForAnimationToEnd
