# Transport 12 — Book transport form validation (empty submit shows errors)

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Book Transport"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: transport_12_empty_form
# Submit with empty fields
- tapOn:
    id: "request_transport_btn"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: transport_12_validation_errors
# Validation errors should appear
- assertVisible:
    text: "required"
    optional: true
