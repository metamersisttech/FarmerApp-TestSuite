# Transport 16: Trip completion screen (read-only view for provider)

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to Transport Dashboard
- tapOn:
    text: "Transport Dashboard"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

- takeScreenshot: transport_16_dashboard

# Tap a completed trip if visible
- tapOn:
    text: "Trip Completed!"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: transport_16_completion_screen

# Tap Back to Dashboard
- tapOn:
    id: "completion_dashboard_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

- takeScreenshot: transport_16_completed

- pressKey: back
- waitForAnimationToEnd
