# Transport 25 — Copy phone button on transport request detail screen

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Nearby Requests"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Tap first request card
- tapOn:
    index: 0
    text: "Pickup Location"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: transport_25_request_detail

# Tap copy phone icon button (tooltip: "Copy phone number")
- tapOn:
    description: "Copy phone number"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: transport_25_phone_copied
