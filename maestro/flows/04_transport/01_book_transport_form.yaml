# Transport 01 — Book Transport: fill form and submit

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml

- waitForAnimationToEnd

# Navigate to Book Transport
- tapOn:
    text: "Book Transport"
    optional: true

- waitForAnimationToEnd

- takeScreenshot: transport_01_form_initial

# Fill Pickup Location
- tapOn:
    text: "Pickup Location"
    optional: true
- inputText: "Village A, Bihar"

# Fill Destination
- tapOn:
    text: "Destination"
    optional: true
- inputText: "Market B, Maharashtra"

# Animal Count (clear default then type)
- tapOn:
    text: "Animal Count"
    optional: true
- clearText
- inputText: "2"

- takeScreenshot: transport_01_form_filled

# Submit
- tapOn:
    id: "request_transport_btn"
    optional: true

- waitForAnimationToEnd:
    timeout: 15000

- takeScreenshot: transport_01_after_submit
