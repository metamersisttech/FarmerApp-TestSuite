# Transport 23 — Delete vehicle with confirmation dialog from vehicle list

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "My Vehicles"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: transport_23_vehicle_list

# Tap Delete on first vehicle card (VehicleCard widget exposes delete action)
- tapOn:
    text: "Delete"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: transport_23_delete_dialog

# Dismiss dialog — tap Cancel
- tapOn:
    text: "Cancel"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: transport_23_delete_dismissed
