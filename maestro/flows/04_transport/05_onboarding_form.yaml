# Transport 05 — Transport provider onboarding form

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Become a Transport Provider"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "apply_now_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: transport_05_onboarding_form
# Fill Business Name
- tapOn:
    text: "Business Name"
    optional: true
- inputText: "Test Transport Co"
- takeScreenshot: transport_05_form_filled
- pressKey: back
- waitForAnimationToEnd
