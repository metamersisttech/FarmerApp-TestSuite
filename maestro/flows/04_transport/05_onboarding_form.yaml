# Transport 05 — Transport provider onboarding form

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Become Transport Provider"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Apply"
    optional: true
- tapOn:
    text: "Get Started"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: transport_05_onboarding_form
- tapOn:
    text: "Business Name"
    optional: true
- inputText: "Test Transport Co"
- tapOn:
    text: "Phone"
    optional: true
- inputText: "${FARMERAPP_TEST_PHONE}"
- takeScreenshot: transport_05_form_filled
- pressKey: back
- waitForAnimationToEnd
