# Transport 15: Trip progress screen shows live status

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to Transport Dashboard (provider flow)
- tapOn:
    text: "Transport Dashboard"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

- takeScreenshot: transport_15_dashboard

# Tap an active job from the Active Jobs list
- tapOn:
    text: "Active Jobs"
    optional: true
- waitForAnimationToEnd

- takeScreenshot: transport_15_trip_progress

# Optional: Confirm Pickup if in accepted state
- tapOn:
    id: "confirm_pickup_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    text: "Confirm Pickup"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

- takeScreenshot: transport_15_progress_actions

- pressKey: back
- waitForAnimationToEnd
