# Transport 03 — Transport booking detail screen

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "My Bookings"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000
- takeScreenshot: transport_03_bookings_list
# Tap first booking card in the list
- tapOn:
    index: 0
    text: "Pending"
    optional: true
- tapOn:
    index: 0
    text: "Accepted"
    optional: true
- tapOn:
    index: 0
    text: "Completed"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: transport_03_booking_detail
- pressKey: back
- waitForAnimationToEnd
