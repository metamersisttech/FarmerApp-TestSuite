# Transport 26 — Vehicle selector and accept button on accept request screen

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Nearby Requests"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Tap first request card to open RequestDetailScreen
- tapOn:
    index: 0
    text: "Pickup Location"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Tap Accept Request button at bottom of RequestDetailScreen
- tapOn:
    id: "proceed_to_accept_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: transport_26_accept_screen

# Select first vehicle in VehicleSelectorCard list
- tapOn:
    text: "Select Vehicle"
    optional: true
- tapOn:
    index: 0
    text: "Active"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: transport_26_vehicle_selected

# Tap Accept Request button (enabled after vehicle selection)
- tapOn:
    id: "accept_request_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: transport_26_confirm_dialog

# Dismiss confirmation dialog
- tapOn:
    text: "Cancel"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: transport_26_cancelled
