# Transport 20 — Availability toggle and quick action buttons on transport dashboard

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Transport Dashboard"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: transport_20_dashboard

# Toggle availability (AvailabilityToggle widget — tap the Switch/toggle label)
- tapOn:
    text: "Available"
    optional: true
- tapOn:
    text: "Offline"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: transport_20_availability_toggled

# Tap View Requests quick action
- tapOn:
    id: "view_requests_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: transport_20_requests_opened
- pressKey: back
- waitForAnimationToEnd

# Tap My Vehicles quick action
- tapOn:
    id: "my_vehicles_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: transport_20_vehicles_opened
- pressKey: back
- waitForAnimationToEnd
