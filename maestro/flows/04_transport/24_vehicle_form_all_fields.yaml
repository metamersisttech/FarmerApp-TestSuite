# Transport 24 — Vehicle form: fill all fields and image pickers (without submitting)

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "My Vehicles"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "add_vehicle_fab"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: transport_24_vehicle_form

# Fill Registration Number
- tapOn:
    text: "Registration Number"
    optional: true
- inputText: "MH01AB1234"

# Fill Make
- tapOn:
    text: "Make"
    optional: true
- inputText: "Tata"

# Fill Model
- tapOn:
    text: "Model"
    optional: true
- inputText: "Ace"

# Fill Max Weight
- tapOn:
    text: "Max Weight Capacity (kg)"
    optional: true
- inputText: "5000"

# Tap Vehicle Type dropdown
- tapOn:
    text: "Vehicle Type"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: transport_24_fields_filled

# Tap RC Document upload area
- tapOn:
    text: "RC Document"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: transport_24_photo_picker
- pressKey: back
- waitForAnimationToEnd
- takeScreenshot: transport_24_photo_cancelled
