# Transport 21 — Fare proposal: -500/+500/Suggested buttons and Propose Fare on trip progress screen

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Transport Dashboard"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: transport_21_trip_progress

# Tap -500 button
- tapOn:
    id: "fare_minus_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: transport_21_minus_tapped

# Tap +500 button
- tapOn:
    id: "fare_plus_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
- takeScreenshot: transport_21_plus_tapped

# Tap Suggested button
- tapOn:
    id: "fare_suggested_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 1000

# Enter custom fare amount
- tapOn:
    text: "Your Fare"
    optional: true
- clearText
- inputText: "2500"
- takeScreenshot: transport_21_fare_entered

# Tap Propose Fare
- tapOn:
    id: "propose_fare_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: transport_21_fare_proposed
