# Transport 07 — Add vehicle form

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "My Vehicles"
    optional: true
- waitForAnimationToEnd
- tapOn:
    id: "add_vehicle_fab"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: transport_07_vehicle_form
# Fill Registration Number
- tapOn:
    text: "Registration Number"
    optional: true
- inputText: "MH12AB1234"
# Fill Max Weight
- tapOn:
    text: "Max Weight Capacity (kg)"
    optional: true
- inputText: "5000"
- takeScreenshot: transport_07_form_filled
- pressKey: back
- waitForAnimationToEnd
