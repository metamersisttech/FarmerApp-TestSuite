# Transport 22 — Cancel Application and Re-upload Documents buttons on pending approval screen

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Application Status"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: transport_22_pending_screen

# Re-upload Documents button (visible when rejected)
- tapOn:
    id: "reupload_documents_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: transport_22_reupload_tapped
- pressKey: back
- waitForAnimationToEnd

# Cancel Application button (visible when pending)
- tapOn:
    id: "cancel_application_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- takeScreenshot: transport_22_cancel_dialog
# Dismiss dialog
- tapOn:
    text: "No, Keep Application"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: transport_22_cancel_dismissed
