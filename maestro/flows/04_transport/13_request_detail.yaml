# Transport 13: Transporter views a transport request's full detail screen

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Navigate to Nearby Requests
- tapOn:
    text: "Nearby Requests"
    optional: true
- waitForAnimationToEnd:
    timeout: 8000

- takeScreenshot: transport_13_requests_list

# Tap first request card in the list
- tapOn:
    index: 0
    text: "Pickup Location"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Assert request detail screen elements visible
- assertVisible:
    text: "Route"
    optional: true
- assertVisible:
    text: "Schedule"
    optional: true
- assertVisible:
    text: "Cargo"
    optional: true
- assertVisible:
    text: "Estimated Fare"
    optional: true

- takeScreenshot: transport_13_request_detail

- pressKey: back
- waitForAnimationToEnd
