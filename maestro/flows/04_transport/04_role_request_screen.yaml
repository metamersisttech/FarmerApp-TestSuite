# Transport 04 — Transport provider role request screen

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    text: "Profile"
    optional: true
- waitForAnimationToEnd
- tapOn:
    text: "Become a Transport Provider"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: transport_04_role_request
# Verify key screen elements
- assertVisible:
    text: "Join Our Transport Network"
    optional: true
- assertVisible:
    text: "Apply Now"
    optional: true
- pressKey: back
- waitForAnimationToEnd
