# Home 02 — Pull to refresh on home screen does not crash

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml

- waitForAnimationToEnd

# Pull to refresh
- scroll:
    direction: DOWN
    duration: 400
- scroll:
    direction: UP
    duration: 1500    # slow upward drag triggers refresh

- waitForAnimationToEnd:
    timeout: 6000

- takeScreenshot: home_02_after_refresh

- assertNotVisible:
    text: "Unfortunately"
