# Home 04 — Recently Viewed section loads

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# The "Recently Viewed Ads" section is visible on the home screen
- assertVisible:
    text: "Recently Viewed Ads"
    optional: true

- takeScreenshot: home_04_recently_viewed
- assertNotVisible:
    text: "Unfortunately"

# Tap View All if present
- tapOn:
    text: "View All"
    optional: true
- waitForAnimationToEnd:
    timeout: 4000
- takeScreenshot: home_04_view_all_tapped
- pressKey: back
- waitForAnimationToEnd
