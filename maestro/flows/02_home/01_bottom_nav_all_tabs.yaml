# Home 01 — Bottom navigation: visit all 4 tabs and screenshot each

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml

- waitForAnimationToEnd

- takeScreenshot: home_01_home_tab

# Tab: Favourite (icon-only nav bar)
- tapOn:
    id: "nav_favourite"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: home_01_favourite_tab

# Tab: My Listings
- tapOn:
    id: "nav_my_listings"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: home_01_my_listings_tab

# Tab: Profile
- tapOn:
    id: "nav_profile"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: home_01_profile_tab

# Back to Home
- tapOn:
    id: "nav_home"
    optional: true
- waitForAnimationToEnd
- takeScreenshot: home_01_back_to_home
