# Home 09 — Call, Chat, and Video icon buttons on animal detail page.
# These are icon-only buttons identified by Key().

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Open first listing
- tapOn:
    id: "listing_card"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: home_09_listing_detail

# Tap Call icon button
- tapOn:
    id: "call_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: home_09_call_tapped
- pressKey: back
- waitForAnimationToEnd

# Tap Chat icon button
- tapOn:
    id: "chat_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: home_09_chat_tapped
- pressKey: back
- waitForAnimationToEnd

# Tap Video icon button
- tapOn:
    id: "video_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: home_09_video_tapped
- pressKey: back
- waitForAnimationToEnd
