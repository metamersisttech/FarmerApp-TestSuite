# Home 03 — Tap animal listing card → opens detail screen

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- takeScreenshot: home_03_home_listing

# Tap first listing card on the home screen
- tapOn:
    id: "listing_card"
    index: 0
    optional: true

- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: home_03_after_tap

# Detail screen should show Buy Now or View Bids
- assertVisible:
    text: "Buy Now"
    optional: true
- assertVisible:
    id: "buy_now_btn"
    optional: true

- pressKey: back
- waitForAnimationToEnd
