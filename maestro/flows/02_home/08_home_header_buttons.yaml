# Home 08 — Home page header buttons: location tap, notifications,
# quick actions (Browse Livestock, Vet Services).

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- takeScreenshot: home_08_home_loaded

# Tap Browse Livestock quick action
- tapOn:
    text: "Browse Livestock"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: home_08_browse_livestock_tapped
- pressKey: back
- waitForAnimationToEnd

# Tap Vet Services quick action
- tapOn:
    text: "Vet Services"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: home_08_vet_services_tapped
- pressKey: back
- waitForAnimationToEnd

# Tap FAB (add listing)
- tapOn:
    id: "main_fab"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: home_08_fab_tapped
- pressKey: back
- waitForAnimationToEnd
