# Home 07 - Animal Detail Interactions (gallery, contact seller, bid, share)

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd
- tapOn:
    id: "listing_card"
    optional: true
- tapOn:
    text: "listing_card"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: home_07_listing_detail
- swipe:
    direction: LEFT
    from:
      x: 80%
      y: 35%
    to:
      x: 20%
      y: 35%
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: home_07_gallery_swiped
- tapOn:
    text: "Contact Seller"
    optional: true
- tapOn:
    id: "contact_seller_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: home_07_contact_seller
- tapOn:
    text: "Back"
    optional: true
- pressKey: BACK
- waitForAnimationToEnd
- tapOn:
    text: "Place Bid"
    optional: true
- tapOn:
    id: "place_bid_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: home_07_bid_dialog
- tapOn:
    text: "Cancel"
    optional: true
- pressKey: BACK
- waitForAnimationToEnd
- tapOn:
    id: "share_btn"
    optional: true
- tapOn:
    description: "Share"
    optional: true
- tapOn:
    text: "Share"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: home_07_share
