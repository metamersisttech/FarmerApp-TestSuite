# Home 07 — Animal Detail: gallery swipe, share, favourite

appId: com.example.flutter_app
---
- runFlow: ../../helpers/login_helper.yaml
- waitForAnimationToEnd

# Open first listing
- tapOn:
    id: "listing_card"
    index: 0
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: home_07_listing_detail

# Swipe gallery image left
- swipe:
    direction: LEFT
    from:
      x: 80%
      y: 35%
    to:
      x: 20%
      y: 35%
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: home_07_gallery_swiped

# Tap share button
- tapOn:
    id: "share_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- takeScreenshot: home_07_share
- pressKey: back
- waitForAnimationToEnd

# Tap favourite button
- tapOn:
    id: "favourite_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- takeScreenshot: home_07_favourite_toggled
