# ============================================================
# FarmerApp — Reusable Login Helper
# ============================================================
# Include in any flow with:
#   - runFlow: ../../helpers/login_helper.yaml
#
# Requires env vars (set in .env.test or passed via --env):
#   FARMERAPP_TEST_PHONE  — test phone number
#   FARMERAPP_TEST_OTP    — fixed OTP for test account
# ============================================================

appId: com.example.flutter_app
---
# Fresh launch with cleared state
- launchApp:
    clearState: true

# Wait for splash + Firebase init
- waitForAnimationToEnd:
    timeout: 10000

# Language screen — select English if visible
- tapOn:
    text: "English"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Welcome page — tap Get Started (key: get_started_btn, text: "Get Started")
- tapOn:
    id: "get_started_btn"
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# Enter phone number (hint: "Enter 10 digit number")
- tapOn:
    text: "Enter 10 digit number"
    optional: true
- inputText: "${FARMERAPP_TEST_PHONE}"

# Tap Get OTP button (key: get_otp_btn, text: "Get OTP")
- tapOn:
    id: "get_otp_btn"
    optional: true
- tapOn:
    text: "Get OTP"
    optional: true

- waitForAnimationToEnd:
    timeout: 8000

# Enter OTP
- inputText: "${FARMERAPP_TEST_OTP}"

# Wait for home screen
- waitForAnimationToEnd:
    timeout: 12000
